function ApplicationsScreen(){
  const[activeTab,setActiveTab]=useState('saved');
  const[jobs,setJobs]=useState(()=>LS.get('hm_saved_jobs',[]));
  const[applied,setApplied]=useState(()=>LS.get('hm_applied_jobs',[]));
  const user=LS.get('hm_user',{});

  const markApplied=job=>{
    const a=[{...job,appliedAt:Date.now(),status:'applied',followedUp:false},...applied];
    setApplied(a);LS.set('hm_applied_jobs',a);
    const s=jobs.filter(j=>j.job_id!==job.job_id);setJobs(s);LS.set('hm_saved_jobs',s);
  };
  const removeSaved=id=>{const u=jobs.filter(j=>j.job_id!==id);setJobs(u);LS.set('hm_saved_jobs',u);};
  const removeApplied=id=>{const u=applied.filter(j=>j.job_id!==id);setApplied(u);LS.set('hm_applied_jobs',u);};

  const updateStatus=(id,status)=>{
    const a=applied.map(j=>j.job_id===id?{...j,status,statusAt:Date.now()}:j);
    setApplied(a);LS.set('hm_applied_jobs',a);
    const counts=LS.get('hm_outcome_counts',{interviews:0,offers:0});
    if(status==='interview')LS.set('hm_outcome_counts',{...counts,interviews:(counts.interviews||0)+1});
    if(status==='offer'){
      LS.set('hm_outcome_counts',{...counts,offers:(counts.offers||0)+1});
      UserNotifs.add(user.email,'🎉 Congratulations on your job offer! We are so proud you found it through OptaJob. Best of luck in your new role!','success');
      EmailAPIs.sendCode(user.email,'CONGRATS','congrats');
      alert('🎉 Congratulations! A celebration email has been sent to you!');
    }
  };
  const markFollowUp=id=>{
    const a=applied.map(j=>j.job_id===id?{...j,followedUp:true,followedUpAt:Date.now()}:j);
    setApplied(a);LS.set('hm_applied_jobs',a);
  };
  const copyFollowUpEmail=job=>{
    const text=`Subject: Follow-up — ${job.title} Application\n\nDear Hiring Team,\n\nI applied for the ${job.title} position at ${job.company} on ${new Date(job.appliedAt).toLocaleDateString('en-IN')} and wanted to express my continued interest.\n\nI would love the opportunity to discuss how my skills align with your team. Please let me know if there are any updates.\n\nThank you for your time.\nBest regards`;
    navigator.clipboard.writeText(text);
    alert('Follow-up email template copied to clipboard!');
  };
  const daysSince=ts=>ts?Math.floor((Date.now()-ts)/86400000):null;
  const STATUSES=[{id:'applied',label:'Applied',color:'#3b82f6'},{id:'interview',label:'Interview',color:'var(--wa)'},{id:'offer',label:'Got Job 🎉',color:'var(--ok)'},{id:'rejected',label:'Rejected',color:'var(--er)'}];
  const tabCounts={saved:jobs.length,applied:applied.filter(j=>j.status==='applied'||!j.status).length,interview:applied.filter(j=>j.status==='interview').length,offer:applied.filter(j=>j.status==='offer').length};
  const filteredApplied=applied.filter(j=>{
    if(activeTab==='applied')return j.status==='applied'||!j.status;
    if(activeTab==='interview')return j.status==='interview';
    if(activeTab==='offer')return j.status==='offer';
    return false;
  });

  return(
    <div className="screen">
      <div className="topbar">
        <div style={{width:32}}/>
        <div className="topbar-title" style={{fontFamily:"'Syne',sans-serif",fontWeight:800}}>Track Jobs</div>
        <div style={{width:32}}/>
      </div>
      <div className="track-tabs">
        {[{id:'saved',label:`Saved (${tabCounts.saved})`},{id:'applied',label:`Applied (${tabCounts.applied})`},{id:'interview',label:`Interview (${tabCounts.interview})`},{id:'offer',label:`Offers (${tabCounts.offer})`}].map(t=>(
          <div key={t.id} className={`track-tab${activeTab===t.id?' on':''}`} onClick={()=>setActiveTab(t.id)}>{t.label}</div>
        ))}
      </div>
      <div className="scroll-area">
        {activeTab==='saved'&&(jobs.length===0?(
          <div className="empty"><div className="empty-icon">🔖</div><div className="empty-title">No saved jobs</div><div className="empty-sub">Save jobs while searching to review them later.</div></div>
        ):jobs.map(job=>(
          <div key={job.job_id} className="job-card">
            <div className="jc-top"><div><div className="jc-title">{job.title}</div><div className="jc-co">{job.company} · {job.location}</div></div><div className="jc-score">{job.matchScore}%</div></div>
            {job.salary&&<div className="jmeta jmeta-sal">💰 {job.salary}</div>}
            {job.postedDate&&<div className="date-badge">🕐 {job.postedDate}</div>}
            <div style={{display:'flex',gap:8,marginTop:10}}>
              <button className="btn btn-primary btn-sm" onClick={()=>markApplied(job)}>✓ Mark Applied</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>removeSaved(job.job_id)}>Remove</button>
              {job.applyUrl&&<a href={job.applyUrl} target="_blank" rel="noreferrer" className="btn btn-outline-accent btn-sm" style={{textDecoration:'none'}}>Apply ↗</a>}
            </div>
          </div>
        )))}
        {(activeTab==='applied'||activeTab==='interview'||activeTab==='offer')&&(filteredApplied.length===0?(
          <div className="empty"><div className="empty-icon">{activeTab==='interview'?'🎯':activeTab==='offer'?'🎉':'📤'}</div><div className="empty-title">Nothing here yet</div><div className="empty-sub">{activeTab==='interview'?'Update status when you get interview calls.':activeTab==='offer'?'Mark here when you land an offer!':'Mark jobs as applied to track them.'}</div></div>
        ):filteredApplied.map(job=>{
          const ds=daysSince(job.appliedAt);
          const needsFollowup=ds>=7&&!job.followedUp&&job.status!=='interview'&&job.status!=='offer';
          return(
            <div key={job.job_id} className="job-card">
              <div className="jc-top"><div><div className="jc-title">{job.title}</div><div className="jc-co">{job.company} · {job.location}</div></div><span className={`status-badge status-${job.status||'applied'}`}>{STATUSES.find(s=>s.id===(job.status||'applied'))?.label||'Applied'}</span></div>
              {job.salary&&<div className="jmeta jmeta-sal">💰 {job.salary}</div>}
              <div style={{fontSize:11,color:'var(--mu)',marginTop:4}}>Applied {ds===0?'today':ds===1?'yesterday':`${ds} days ago`} · {new Date(job.appliedAt).toLocaleDateString('en-IN')}</div>
              {needsFollowup&&<div className="followup-bar"><span style={{fontSize:14}}>📩</span><div style={{flex:1,fontSize:12,color:'var(--wa)'}}>7+ days — time to follow up!</div><button className="btn btn-sm" style={{background:'var(--wa)',color:'#000'}} onClick={()=>copyFollowUpEmail(job)}>Copy Email</button><button className="btn btn-ghost btn-sm" onClick={()=>markFollowUp(job.job_id)}>Done</button></div>}
              <div style={{marginTop:10}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--mu)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em'}}>Update Status</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{STATUSES.map(s=><button key={s.id} className="btn btn-sm" onClick={()=>updateStatus(job.job_id,s.id)} style={{background:(job.status||'applied')===s.id?s.color:'var(--s2)',color:(job.status||'applied')===s.id?'#fff':'var(--mu)',border:`1px solid ${(job.status||'applied')===s.id?s.color:'var(--bo)'}`}}>{s.label}</button>)}</div>
              </div>
              {job.status==='interview'&&<div className="prep-teaser" onClick={()=>alert('🎯 Interview Prep coming soon! AI-powered practice Q&A for your specific role.')}><div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:24}}>🎯</span><div><div style={{fontSize:13,fontWeight:700,color:'var(--tx)'}}>Interview Prep — Coming Soon</div><div style={{fontSize:11.5,color:'var(--mu)'}}>AI practice questions for {job.company}. Tap to get notified.</div></div></div></div>}
              <button className="btn btn-ghost btn-sm" style={{marginTop:8}} onClick={()=>removeApplied(job.job_id)}>Remove</button>
            </div>
          );
        }))}
      </div>
    </div>
  );
}

function ResumeScreen({onTabChange}){
  const[resumes,setResumes]=useState(()=>LS.get('hm_resumes',[]));
  const[editingId,setEditingId]=useState(null);
  const[editText,setEditText]=useState('');
  const fileRef=useRef(null);

  const[uploadingMsg,setUploadingMsg]=useState('');
  const uploadFile=async file=>{
    if(!file)return;
    if(resumes.length>=3){alert('Max 3 resumes. Delete one first.');return;}
    const fname=file.name.toLowerCase();
    let text='';
    try{
      if(fname.endsWith('.pdf')){
        setUploadingMsg('Reading PDF…');
        text=await extractPdfText(file);
      }else if(fname.endsWith('.docx')){
        setUploadingMsg('Reading Word document…');
        text=await extractDocxText(file);
      }else if(fname.endsWith('.doc')){
        setUploadingMsg('');
        alert('Old .doc format is not supported. Please save your resume as PDF or .docx and try again.');
        return;
      }else{
        setUploadingMsg('Reading file…');
        text=await file.text();
      }
    }catch(e){
      setUploadingMsg('');
      alert('Could not read this file. Please make sure it is a valid PDF, .docx, or .txt resume. ('+(e.message||'error')+')');
      return;
    }
    setUploadingMsg('');
    text=(text||'').replace(/\u0000/g,'').trim();
    if(!text||text.length<20){
      alert('We could not find readable text in this file. If your resume is a scanned image, please use a text-based PDF or paste the text into a .txt file.');
      return;
    }
    const r={id:Date.now(),name:file.name.replace(/\.[^.]+$/,''),content:text,wordCount:text.split(/\s+/).filter(Boolean).length,savedAt:Date.now()};
    const u=[...resumes,r];setResumes(u);LS.set('hm_resumes',u);
  };

  const del=id=>{const u=resumes.filter(r=>r.id!==id);setResumes(u);LS.set('hm_resumes',u);};

  
  return(
    <div className="screen">
      <div className="topbar">
        <div><div className="topbar-title">Resume Hub</div><div className="topbar-sub">Manage and check your resumes</div></div>
      </div>

      {/* Privacy note */}
      <div style={{margin:'12px 20px',padding:'10px 12px',background:'var(--okp)',border:'1px solid rgba(34,197,94,.2)',borderRadius:'var(--r1)',fontSize:12,color:'var(--ok)',lineHeight:1.5}}>
        🔒 Your resumes are stored only on this device. Never uploaded to any server.
      </div>

      {/* Upload */}
      <input ref={fileRef} type="file" accept=".txt,.docx,.pdf" style={{display:'none'}} onChange={e=>uploadFile(e.target.files?.[0])}/>
      {resumes.length<3&&(
        <div style={{padding:'0 20px 12px'}}>
          <label style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,padding:'14px',border:'1.5px dashed var(--bo)',borderRadius:'var(--r2)',cursor:'pointer',fontSize:14,fontWeight:500,color:'var(--mu)',background:'var(--s)',transition:'all .18s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--ac)';e.currentTarget.style.color='var(--ac)';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--bo)';e.currentTarget.style.color='var(--mu)';}}
            onClick={()=>fileRef.current?.click()}>
            <div style={{width:20,height:20}}><Icon.Upload/></div>
            {uploadingMsg?uploadingMsg:`Upload Resume (${3-resumes.length} slot${3-resumes.length!==1?'s':''} left) · PDF, DOCX, TXT`}
          </label>
          <div style={{fontSize:11,color:'var(--mu)',textAlign:'center',marginTop:6}}>Tip: text-based PDFs and Word (.docx) files work best. Scanned images won't extract.</div>
        </div>
      )}

      {/* Resume list */}
      <div className="sh"><span className="sh-title">Your Resumes ({resumes.length}/3)</span></div>
      {resumes.length===0?(
        <div className="empty" style={{paddingTop:20}}>
          <div className="empty-icon">📄</div>
          <div className="empty-sub">Upload up to 3 resumes. Choose which one to use on each job search.</div>
        </div>
      ):(
        <div style={{padding:'0 20px'}}>
          {resumes.map((r,i)=>(
            <React.Fragment key={r.id}>
            <div className="rslot">
              <div className="rslot-icon">📄</div>
              <div style={{flex:1}}>
                <div className="rslot-name">{r.name}</div>
                <div className="rslot-meta">{r.wordCount} words · {i===0?'Default · ':''}Saved {new Date(r.savedAt).toLocaleDateString('en-IN')}</div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-primary btn-sm" onClick={()=>{window._ojResumeSearch=extractResumeSearch(r.content);onTabChange&&onTabChange('search');}} title="Find matching jobs" style={{whiteSpace:'nowrap'}}>🔍 Find Jobs</button>
                <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>{setEditingId(editingId===r.id?null:r.id);setEditText(r.content);}} title="Edit text">✏️</button>
                <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>navigator.clipboard.writeText(r.content)} title="Copy"><Icon.Copy/></button>
                <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>{const a=document.createElement('a');a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(r.content);a.download=r.name+'.txt';a.click();}} title="Download"><Icon.Download/></button>
                <button className="btn btn-danger btn-sm btn-icon" onClick={()=>del(r.id)} title="Delete"><Icon.Trash/></button>
              </div>
            </div>
            {editingId===r.id&&(
              <div style={{padding:'0 4px 12px'}}>
                <textarea className="input" value={editText} onChange={e=>setEditText(e.target.value)} style={{minHeight:200,resize:'vertical',fontSize:13,lineHeight:1.5,width:'100%'}}/>
                <div style={{display:'flex',gap:8,marginTop:8}}>
                  <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={()=>setEditingId(null)}>Cancel</button>
                  <button className="btn btn-primary btn-sm" style={{flex:2}} onClick={()=>{const u=resumes.map(x=>x.id===r.id?{...x,content:editText,wordCount:editText.split(/\s+/).filter(Boolean).length}:x);setResumes(u);LS.set('hm_resumes',u);setEditingId(null);}}>Save Changes</button>
                </div>
              </div>
            )}
            </React.Fragment>
          ))}
        </div>
      )}

      <div style={{height:20}}/>
    </div>
  );
}

  const[showNotifPanel,setShowNotifPanel]=useState(false);

  const[showKey,setShowKey]=useState({});
  const[saved,setSaved]=useState(false);
  const[delConfirm,setDelConfirm]=useState(false);
  const[guideId,setGuideId]=useState(null);
  const batches=ctx?.batches||[];
  const tot=ctx?.tot||0;
  const dailyFree=Math.max(0,DAILY_FREE-Credits.dailyUsed());
  const freeDaysLeft=Credits.freeDaysLeft();
  const fmtExp=ts=>{const d=Math.ceil((ts-Date.now())/86400000);return`${d}d`;};
  const planColor={free:'var(--mu)',starter:'var(--ok)',pro:'var(--pr)',elite:'var(--ac)'};
  const planBg={free:'var(--s2)',starter:'var(--okp)',pro:'rgba(37,99,168,.12)',elite:'var(--ap)'};

  const saveProfile=()=>{
    const u={...user,name,phone,avatarId};LS.set('hm_user',u);UDB.set(user.email,{name,phone,avatarId});LS.set('hm_hk',hunterKey);LS.set('hm_ak',adzunaKey);LS.set('hm_rk',rapidKey);

  };

  if(section==='help') return <HelpScreen user={user} onBack={()=>setSection('main')}/>;

  if(section==='adminLogin'){
    const[pw,setPw]=useState('');
    const[err,setErr]=useState('');
    return(
      <div className="screen">
        <div className="topbar">
          <button className="btn btn-ghost btn-sm" onClick={()=>{setSection('main');setPw('');setErr('');}}>← Back</button>
          <div className="topbar-title" style={{fontFamily:"'Syne',sans-serif",fontWeight:800}}>Admin Access</div>
          <div style={{width:60}}/>
        </div>
        <div style={{padding:'40px 24px',display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
          <OptaJobIcon size={56}/>
          <div style={{fontSize:14,color:'var(--mu)',textAlign:'center',lineHeight:1.55}}>Enter admin password to continue.<br/>This area is for authorised personnel only.</div>
          <input className="input" type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){if(pw===atob('VWx0aW1hdGVAMTIzIw==')){onUpdate({...user,_admin:true});setSection('main');}else setErr('Wrong password');}} } placeholder="Admin password" style={{textAlign:'center',letterSpacing:'.1em',maxWidth:280}}/>
          {err&&<div style={{fontSize:12,color:'var(--er)'}}>{err}</div>}
          <button className="btn btn-primary" style={{width:280}} onClick={()=>{if(pw===atob('VWx0aW1hdGVAMTIzIw==')){onUpdate({...user,_admin:true});/* signal to parent */window._openAdmin=true;setSection('main');}else setErr('Wrong password');}}>

          <div style={{fontSize:11,color:'var(--mu)',textAlign:'center',marginTop:8}}>Admin access secured.</div>
        </div>
      </div>
    );

// ── JOB API TAB ──────────────────────────────────────────────────────
function JobAPITab(){
  const[apis,setApis]=useState(()=>LS.get('hm_job_apis',{providers:[],curIdx:0,switchEvery:10,curCount:0}));
  const[form,setForm]=useState({name:'',key:'',type:'jsearch',dailyLimit:500,enabled:true});
  const[adding,setAdding]=useState(false);
  const{copy,copied}=useCopy();
  const save=updated=>{setApis(updated);LS.set('hm_job_apis',updated);};
  const addApi=()=>{
    if(!form.key.trim())return;
    const p={id:'japi_'+Date.now(),...form,usedToday:0,usedTotal:0,lastReset:'',addedAt:Date.now()};
    save({...apis,providers:[...apis.providers,p]});
    setForm({name:'',key:'',type:'jsearch',dailyLimit:500,enabled:true});setAdding(false);
  };
  const toggle=id=>save({...apis,providers:apis.providers.map(p=>p.id===id?{...p,enabled:!p.enabled}:p)});
  const remove=id=>{if(!window.confirm('Remove this API?'))return;save({...apis,providers:apis.providers.filter(p=>p.id!==id)});};
  const today=new Date().toDateString();
  return(
    <div>
      <div style={{background:'var(--ap)',border:'1px solid rgba(212,165,32,.2)',borderRadius:'var(--r2)',padding:'14px',marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:600,color:'var(--tx)',marginBottom:6}}>Job Search API Rotation</div>
        <div style={{fontSize:12,color:'var(--mu)',lineHeight:1.5}}>Add multiple API keys. The app rotates between them automatically. When one reaches 60% of daily limit, admin is notified. Add your JSearch (RapidAPI) key here.</div>
      </div>
      {apis.providers.length===0&&<div className="empty"><div className="empty-icon">🔌</div><div className="empty-sub">No job APIs yet. Add your JSearch key below.</div></div>}
      {apis.providers.map(p=>{
        const used=p.lastReset===today?p.usedToday||0:0;

  const stats={total:codes.length,active:codes.filter(c=>getStatus(c)==='active').length,used:codes.filter(c=>c.status==='used').length};

    const p=PLANS.find(x=>x.id===plan);
    const nc=Array.from({length:count},()=>({
      key:prefix?`${prefix.toUpperCase()}-${Math.random().toString(36).substring(2,7).toUpperCase()}`:genAdminCode(plan),
      plan,credits:p.credits,status:'active',createdAt:Date.now(),expiresAt:Date.now()+expDays*86400000,note:note||'',oneTime:true,
    }));
    save([...nc,...codes]);setLastGen(nc);
  };

  const filtered=codes.filter(c=>{
    if(filterSt!=='all'&&getStatus(c)!==filterSt)return false;
    if(search&&!c.key.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',flexDirection:'column'}}>
      <div className="topbar">
        <OptaJobWordmark/>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:11,padding:'3px 10px',borderRadius:20,background:'var(--erp)',color:'var(--er)',fontWeight:700,border:'1px solid rgba(239,68,68,.2)'}}>Admin</span>
          <button className="btn btn-ghost btn-sm" onClick={onExit}>Exit ✕</button>
        </div>
      </div>
      <div className="stat-grid" style={{paddingTop:14}}>
        <div className="stat-box"><div className="stat-val" style={{color:'var(--tx)'}}>{stats.total}</div><div className="stat-lbl">Total Codes</div></div>
        <div className="stat-box"><div className="stat-val" style={{color:'var(--ok)'}}>{stats.active}</div><div className="stat-lbl">Active</div></div>
        <div className="stat-box"><div className="stat-val" style={{color:'var(--mu)'}}>{stats.used}</div><div className="stat-lbl">Used</div></div>
        <div className="stat-box"><div className="stat-val" style={{color:'var(--wa)'}}>{pendingUsers.filter(u=>u.status==='pending').length}</div><div className="stat-lbl">Pending</div></div>
      </div>
      <div className="admin-tabs">
        {[['users','👤 Users'],['generate','✦ Generate'],['codes','All Codes'],['jobapis','🔌 Job APIs'],['emailapis','📧 Email APIs'],['adnets','📱 Ad Networks'],['admins','🛡 Admins'],['queries','💬 Queries'],['notifs','🔔 Alerts']].map(([id,lbl])=>(
          <button key={id} className={`atab ${tab===id?'on':''}`} onClick={()=>setTab(id)}>{lbl}</button>
        ))}
      </div>
      <div style={{flex:1,overflow:'auto',padding:'0 20px 80px'}}>
        {/* USERS */}
        {tab==='users'&&<>
          {/* Global AI master switch */}
          {(()=>{
            const[globalAI,setGlobalAI]=useState(()=>LS.get('hm_ai_global',false));
            return(
              <div style={{background:globalAI?'var(--okp)':'var(--s2)',border:`1px solid ${globalAI?'rgba(34,197,94,.3)':'var(--bo)'}`,borderRadius:'var(--r2)',padding:'14px',marginBottom:14}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,color:'var(--tx)',marginBottom:2}}>🤖 AI Features — Global Switch</div>
                    <div style={{fontSize:12,color:'var(--mu)',lineHeight:1.5}}>{globalAI?'ON — Users you approve can use their own AI keys for enhanced contact finding':'OFF (default) — No user can use AI features regardless of individual settings'}</div>
                  </div>
                  <Toggle on={globalAI} onChange={()=>{const n=!globalAI;setGlobalAI(n);LS.set('hm_ai_global',n);}}/>
                </div>
                {globalAI&&<div style={{marginTop:10,padding:'8px 10px',background:'rgba(34,197,94,.08)',borderRadius:'var(--r1)',fontSize:11.5,color:'var(--ok)',lineHeight:1.5}}>
                  ✅ Individually enable AI per user below. Users pay for their own AI API calls — you pay nothing.
                </div>}
              </div>
            );
          })()}

          {pendingUsers.length===0?<div className="empty"><div className="empty-icon">👤</div><div className="empty-sub">No signups yet. Share your app to get registrations.</div></div>:
          pendingUsers.map(u=>{
            const st=u.status||'pending';
            const autoCode=genCodes[u.email]||u.adminCode;
            const[userAI,setUserAI]=useState(()=>!!(LS.get('hm_ai_users',{})[u.email]));
            const toggleUserAI=()=>{
              const all=LS.get('hm_ai_users',{});
              const next=!userAI;
              all[u.email]=next;
              LS.set('hm_ai_users',all);
              setUserAI(next);
            };
            return(
              <div key={u.email} style={{background:'var(--s)',border:`1px solid ${st==='pending'?'var(--bs)':st==='approved'?'rgba(34,197,94,.2)':'rgba(239,68,68,.2)'}`,borderRadius:'var(--r2)',padding:'14px',marginBottom:10}}>
                <div className="user-row" style={{paddingTop:0,borderBottom:'none',paddingBottom:8}}>
                  <div style={{flex:1}}>
                    <div className="user-email">{u.name}</div>
                    <div className="user-meta">{u.email} · {new Date(u.registeredAt).toLocaleDateString('en-IN')}</div>
                  </div>
                  <span className={`pill ${st==='pending'?'pill-accent':st==='approved'?'pill-ok':'pill-err'}`} style={{fontSize:10}}>
                    {st==='pending'?'⏳ Pending':st==='approved'?'✅ Approved':'❌ Rejected'}
                  </span>
                </div>
                {st==='approved'&&LS.get('hm_ai_global',false)&&(
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderTop:'1px solid var(--bo)',marginTop:4}}>
                    <div>
                      <div style={{fontSize:12.5,fontWeight:500,color:'var(--tx)'}}>🤖 AI Features</div>
                      <div style={{fontSize:11,color:'var(--mu)'}}>{userAI?'Can use own AI Engine/Gemini/OpenAI key':'No AI access'}</div>
                    </div>
                    <Toggle on={userAI} onChange={toggleUserAI}/>
                  </div>
                )}
                {st==='pending'&&<div style={{display:'flex',gap:8,marginTop:8}}>
                  <button className="btn btn-primary btn-sm" style={{flex:1}} onClick={()=>approve(u)}>✓ Approve</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>reject(u)}>✕ Reject</button>
                </div>}
                {autoCode&&<div className="gen-box" style={{marginTop:8}}>
                  <div style={{flex:1}}><div style={{fontSize:10,fontWeight:600,color:'var(--mu)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:3}}>Access Code — share with user</div><div className="gen-key">{autoCode}</div></div>
                  <button className="btn btn-ghost btn-sm" onClick={()=>copy(autoCode,'code'+u.email)}>{copied==='code'+u.email?<Icon.Check/>:<Icon.Copy/>}</button>
                </div>}
              </div>
            );
          })}
          {blocked.length>0&&<div style={{marginTop:14,padding:'12px',background:'var(--erp)',borderRadius:'var(--r1)',fontSize:12,color:'var(--er)'}}>

          </div>}
        </>}

        {/* GENERATE */}
        {tab==='generate'&&<>

              {PLANS.map(p=>(
                <button key={p.id} className={`chip ${plan===p.id?'on':''}`} onClick={()=>setPlan(p.id)} style={{fontSize:12}}>

              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div><label className="label">Prefix (optional)</label><input className="input" value={prefix} onChange={e=>setPrefix(e.target.value.replace(/[^a-zA-Z0-9]/g,'').slice(0,8))} placeholder="e.g. VIP, LAUNCH" style={{textTransform:'uppercase'}}/></div>
              <div><label className="label">Expiry (days)</label>
                <select className="input" value={expDays} onChange={e=>setExpDays(+e.target.value)} style={{appearance:'none'}}>

              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div><label className="label">Count</label>
                <select className="input" value={count} onChange={e=>setCount(+e.target.value)} style={{appearance:'none'}}>
                  {[1,2,5,10,25,50].map(n=><option key={n} value={n}>{n} code{n>1?'s':''}</option>)}
                </select>
              </div>
              <div><label className="label">Note (internal)</label><input className="input" value={note} onChange={e=>setNote(e.target.value)} placeholder="Campaign name…"/></div>
            </div>
            <button className="btn btn-primary btn-full" onClick={generateCodes}>⚡ Generate {count} Code{count>1?'s':''}</button>
          </div>
          {lastGen.length>0&&<div style={{background:'var(--s)',border:'1px solid var(--bo)',borderRadius:'var(--r2)',padding:'14px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--tx)'}}>Generated ({lastGen.length})</div>
              <button className="btn btn-ghost btn-sm" onClick={()=>{navigator.clipboard.writeText(lastGen.map(c=>c.key).join('\n'));}}>Copy All</button>
            </div>
            {lastGen.map(c=>(
              <div key={c.key} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid var(--bo)'}}>
                <span style={{fontFamily:'monospace',fontSize:15,fontWeight:700,letterSpacing:'.05em',color:'var(--tx)',flex:1}}>{c.key}</span>
                <span className={`pill pill-muted`} style={{fontSize:10}}>{PLANS.find(p=>p.id===c.plan)?.label}</span>
                <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>copy(c.key,'g'+c.key)}>{copied==='g'+c.key?<Icon.Check/>:<Icon.Copy/>}</button>
              </div>
            ))}
          </div>}
        </>}

        {/* ALL CODES */}
        {tab==='codes'&&<>
          <div style={{display:'flex',gap:8,marginBottom:10,marginTop:4}}>
            <input className="input" style={{flex:1}} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search codes…"/>
            <select className="input" style={{width:'auto',appearance:'none'}} value={filterSt} onChange={e=>setFilterSt(e.target.value)}>
              <option value="all">All</option><option value="active">Active</option><option value="used">Used</option><option value="expired">Expired</option>
            </select>
          </div>
          {filtered.length===0?<div className="empty"><div className="empty-sub">{codes.length===0?'No codes yet.':'Nothing matches.'}</div></div>:
          filtered.map(c=>{
            const st=getStatus(c);
            return(
              <div key={c.key} className="code-row">
                <div style={{flex:1}}>
                  <div className="code-key">{c.key}</div>
                  <div style={{fontSize:11,color:'var(--mu)',marginTop:2}}>{c.plan} · {c.note||''} · exp {fmtDate(c.expiresAt)}</div>
                </div>
                <span className={`pill ${st==='active'?'pill-ok':st==='used'?'pill-muted':'pill-err'}`} style={{fontSize:10,flexShrink:0}}>{st}</span>
                <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>copy(c.key,'all'+c.key)}>{copied==='all'+c.key?<Icon.Check/>:<Icon.Copy/>}</button>
                {st==='active'&&<button className="btn btn-danger btn-sm" onClick={()=>save(codes.map(x=>x.key===c.key?{...x,status:'revoked'}:x))}>Revoke</button>}
              </div>
            );
          })}
        </>}

        {/* JOB APIS */}
        {tab==='jobapis'&&<JobAPITab/>}

        {/* EMAIL APIS */}
        {tab==='emailapis'&&<EmailAPITab/>}

        {/* AD NETWORKS */}
        {tab==='adnets'&&<AdNetworksTab/>}

        {/* ADMIN USERS */}
        {tab==='admins'&&<AdminUsersTab/>}

        {/* NOTIFICATIONS */}
        {tab==='notifs'&&<AdminNotifsTab/>}

        {/* PAYMENTS — legacy */}
        {tab==='payments'&&<div style={{paddingTop:4}}>
          <div style={{background:'var(--s)',border:'1px solid var(--bo)',borderRadius:'var(--r2)',padding:'16px',marginBottom:14}}>
            <div style={{fontFamily:'Syne,sans-serif',fontSize:15,fontWeight:700,marginBottom:4}}>Payments are OFF</div>
            <div style={{fontSize:13,color:'var(--mu)',lineHeight:1.55}}>Users activate via codes only. Turn ON when payment gateway is ready.</div>
          </div>
        </div>}
      </div>
    </div>
  );
}

function APIGuideModal({apiId,onClose}){
  const[step,setStep]=useState(0);
  const guide=API_GUIDES[apiId];
  if(!guide)return null;
  const s=guide.steps[step];
  const isLast=step===guide.steps.length-1;

  return(
    <div className="modal-wrap" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-sheet" style={{maxHeight:'92vh'}}>
        <div className="modal-drag"/>
        <div className="modal-head">
          <div>
            <div className="modal-title">{guide.emoji} {guide.name} Setup</div>
            <div className="modal-sub">{guide.cost}</div>
          </div>
          <button className="btn btn-ghost btn-icon btn-sm" onClick={onClose}><Icon.X/></button>
        </div>

        {/* Progress dots */}
        <div style={{display:'flex',gap:4,padding:'10px 20px',borderBottom:'1px solid var(--bo)'}}>
          {guide.steps.map((_,i)=>(
            <div key={i} onClick={()=>setStep(i)} style={{
              height:4,flex:1,borderRadius:2,cursor:'pointer',transition:'background .2s',
              background:i<step?'var(--ok)':i===step?guide.color:'var(--bo)'
            }}/>
          ))}
        </div>

        <div className="modal-body">
          {/* Step number */}
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
            <div style={{width:36,height:36,borderRadius:18,background:guide.color+'20',border:`2px solid ${guide.color}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>
              {s.icon}
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--mu)'}}>Step {step+1} of {guide.steps.length}</div>
              <div style={{fontSize:15,fontWeight:700,color:'var(--tx)',fontFamily:'Syne,sans-serif'}}>{s.title}</div>
            </div>
          </div>

          {/* Browser mockup illustration */}
          {s.url&&(
            <div style={{background:'var(--s2)',borderRadius:'var(--r2)',overflow:'hidden',marginBottom:14,border:'1px solid var(--bo)'}}>
              {/* Browser chrome */}
              <div style={{background:'rgba(0,0,0,.25)',padding:'8px 10px',display:'flex',gap:6,alignItems:'center'}}>
                <div style={{display:'flex',gap:4}}>
                  {['#ff5f57','#febc2e','#28c840'].map(c=><div key={c} style={{width:8,height:8,borderRadius:'50%',background:c}}/>)}
                </div>
                <div style={{flex:1,background:'rgba(255,255,255,.1)',borderRadius:4,padding:'3px 10px',fontSize:11,color:'rgba(255,255,255,.6)',fontFamily:'monospace'}}>
                  🔒 {s.url}
                </div>
              </div>
              {/* Simulated page content */}
              <div style={{padding:'14px 16px',minHeight:80,position:'relative'}}>
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  <div style={{height:8,background:'var(--bo)',borderRadius:4,width:'60%'}}/>
                  <div style={{height:6,background:'var(--bo)',borderRadius:4,width:'40%',opacity:.6}}/>
                  <div style={{display:'flex',gap:6,marginTop:8}}>
                    <div style={{height:28,background:guide.color+'30',border:`1px solid ${guide.color}60`,borderRadius:6,padding:'0 12px',display:'flex',alignItems:'center',fontSize:11,fontWeight:600,color:guide.color}}>
                      {step===0?'Sign Up':step===guide.steps.length-1?'Copy':step<2?'Verify Email':'Continue'}
                    </div>
                    <div style={{height:28,background:'var(--bo)',borderRadius:6,flex:1}}/>
                  </div>
                </div>
                {/* Highlight arrow */}
                <div style={{position:'absolute',right:14,bottom:10,fontSize:18}}>👆</div>
              </div>
            </div>
          )}

          {/* Instruction */}
          <div style={{fontSize:14,color:'var(--tx)',lineHeight:1.7,marginBottom:14}}>{s.desc}</div>

          {/* Highlight box — what to look for */}
          <div style={{background:guide.color+'15',border:`1px solid ${guide.color}30`,borderRadius:'var(--r1)',padding:'10px 12px',marginBottom:14}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:guide.color,marginBottom:4}}>What to look for</div>
            <div style={{fontSize:13,color:'var(--tx)',lineHeight:1.5}}>{s.highlight}</div>
          </div>

          {/* Tip for last step */}
          {isLast&&(
            <div style={{background:'var(--okp)',border:'1px solid rgba(34,197,94,.2)',borderRadius:'var(--r1)',padding:'12px',marginBottom:14,fontSize:13,color:'var(--ok)',lineHeight:1.55}}>
              ✅ You're all set! After pasting your key in OptaJob, tap "Test Connection" to confirm it works. Green tick = ready to use.
            </div>
          )}
        </div>

        <div className="modal-foot">
          {step>0&&<button className="btn btn-ghost" style={{flex:1}} onClick={()=>setStep(s=>s-1)}>← Previous</button>}
          {!isLast?(
            <button className="btn btn-primary" style={{flex:2}} onClick={()=>setStep(s=>s+1)}>Next Step →</button>
          ):(
            <button className="btn btn-primary" style={{flex:2,background:'var(--ok)'}} onClick={onClose}>✓ Got it! Close Guide</button>
          )}
        </div>
      </div>
    </div>
  );
}

function HelpScreen({user,onBack}){
  const[tab,setTab]=useState('faq');
  const[searchQ,setSearchQ]=useState('');
  const[openIdx,setOpenIdx]=useState(null);
  const[queryText,setQueryText]=useState('');
  const[querySent,setQuerySent]=useState(false);
  const[guideId,setGuideId]=useState(null);
  const[myQueries,setMyQueries]=useState(()=>LS.get('hm_queries',[]).filter(q=>q.userEmail===user?.email));

  const matched=searchQ.trim().length>1
    ?FAQ_ITEMS.filter(f=>f.keywords.some(k=>searchQ.toLowerCase().includes(k))||f.q.toLowerCase().includes(searchQ.toLowerCase()))
    :FAQ_ITEMS;

  const sendQuery=()=>{
    if(!queryText.trim())return;
    const q={id:Date.now(),userEmail:user?.email||'',userName:user?.name||'User',question:queryText.trim(),status:'open',adminReply:null,createdAt:Date.now()};
    const all=LS.get('hm_queries',[]);
    all.unshift(q);
    LS.set('hm_queries',all);
    setMyQueries([q,...myQueries]);
    setQueryText('');
    setQuerySent(true);
    setTimeout(()=>setQuerySent(false),3000);
  };

  const APP_GUIDES=[
    {id:'getting-started',icon:'🚀',title:'Getting Started',steps:['Register with your email','Wait for admin to send your access code (24-48 hrs)','Enter the code in "Have a Code" tab','You\'re in! Start on the Home screen','Upload your resume in the Resume tab first','Use the Search tab to find matching jobs']},
    {id:'credits-guide',icon:'💳',title:'Understanding Credits',steps:['You get 3 free credits every day','Each credit = full access to 1 job (tailor + contact + cover letter)','Credits expire in exactly 3 days from when added','Watch ads anytime to earn more — no limit','Profile → Credits to see your balance and expiry dates']},
    {id:'search-guide',icon:'🔍',title:'How to Search Jobs',steps:['Tap Search tab at the bottom','Type a job title, skill or company name','Tap Filters ▼ to add cities and job type','If resume is uploaded, it shows which one is active','Tap "Find Matching Jobs" — takes ~30 seconds','Jobs appear with match %, salary, company info']},
    {id:'apply-guide',icon:'📬',title:'Applying for Jobs',steps:['Find a job you like in Search results','Tap "Apply Now ↗" — opens the real job posting','To track it, tap ⭐ to save first','After applying, find it in Applications tab','Tap "Mark Applied" to move it to Applied section','All your applications tracked in one place']},
  ];

  return(
    <>
      <div className="screen">
        <div className="topbar">
          <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
          <div className="topbar-title">Help & Support</div>
          <div style={{width:60}}/>
        </div>

        {/* Tab bar */}
        <div style={{display:'flex',gap:4,padding:'10px 20px',borderBottom:'1px solid var(--bo)',overflowX:'auto'}}>
          {[['faq','💬 FAQ'],['guides','📖 Guides'],['api','🔑 API Setup'],['contact','✉ Contact Admin']].map(([id,lbl])=>(
            <button key={id} className={`atab ${tab===id?'on':''}`} onClick={()=>setTab(id)} style={{fontSize:12,flexShrink:0}}>{lbl}</button>
          ))}
        </div>

        {/* FAQ TAB */}
        {tab==='faq'&&(
          <div style={{padding:'14px 20px 0'}}>
            <div style={{position:'relative',marginBottom:16}}>
              <svg viewBox="0 0 24 24" style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',width:16,height:16,stroke:'var(--mu)',fill:'none',strokeWidth:2}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input className="input" style={{paddingLeft:38}} value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Search help topics… e.g. 'credits', 'resume', 'AI'"/>
            </div>
            {searchQ.trim().length>1&&matched.length===0&&(
              <div style={{textAlign:'center',padding:'24px 0',color:'var(--mu)',fontSize:13}}>
                No matching topics. Try the Contact Admin tab to ask your question directly.
              </div>
            )}
            {matched.map((f,i)=>(
              <div key={i} style={{background:'var(--s)',border:'1px solid var(--bo)',borderRadius:'var(--r2)',marginBottom:8,overflow:'hidden'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px',cursor:'pointer'}} onClick={()=>setOpenIdx(openIdx===i?null:i)}>
                  <div style={{fontSize:13.5,fontWeight:600,color:'var(--tx)',flex:1,paddingRight:8}}>{f.q}</div>
                  <div style={{color:'var(--mu)',fontSize:16,transform:openIdx===i?'rotate(180deg)':'none',transition:'transform .2s'}}>▼</div>
                </div>
                {openIdx===i&&(
                  <div style={{padding:'0 16px 14px',fontSize:13,color:'var(--sb)',lineHeight:1.7,borderTop:'1px solid var(--bo)',paddingTop:12}}>{f.a}</div>

              </div>
            ))}
          </div>
        )}

        {/* GUIDES TAB */}
        {tab==='guides'&&(
          <div style={{padding:'14px 20px 0'}}>
            {APP_GUIDES.map((g,i)=>(
              <div key={g.id} style={{background:'var(--s)',border:'1px solid var(--bo)',borderRadius:'var(--r2)',marginBottom:10,overflow:'hidden'}}>

                      </div>

                  </div>

              </div>
            ))}
          </div>
        )}

        {/* API SETUP TAB */}
        {tab==='api'&&(
          <div style={{padding:'14px 20px 0'}}>
            <div style={{fontSize:13,color:'var(--mu)',marginBottom:16,lineHeight:1.6}}>

            </div>
            {Object.entries(API_GUIDES).map(([id,g])=>(
              <div key={id} style={{background:'var(--s)',border:'1px solid var(--bo)',borderRadius:'var(--r2)',marginBottom:10,padding:'14px 16px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',transition:'border-color .18s'}}
                onClick={()=>setGuideId(id)}
                onMouseEnter={e=>e.currentTarget.style.borderColor='var(--bs)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--bo)'}>
                <div style={{width:40,height:40,borderRadius:'var(--r1)',background:g.color+'20',border:`1px solid ${g.color}40`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{g.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13.5,fontWeight:600,color:'var(--tx)',marginBottom:2}}>{g.name}</div>
                  <div style={{fontSize:11.5,color:'var(--mu)'}}>{g.tagline}</div>
                  <div style={{fontSize:11,color:g.color,marginTop:3,fontWeight:500}}>{g.cost}</div>
                </div>
                <div style={{color:'var(--mu)',width:16,height:16}}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9,18 15,12 9,6"/></svg>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* CONTACT ADMIN TAB */}
        {tab==='contact'&&(
          <div style={{padding:'14px 20px 0'}}>
            <div style={{background:'var(--s2)',borderRadius:'var(--r2)',padding:'14px',marginBottom:16,fontSize:13,color:'var(--mu)',lineHeight:1.6}}>
              💡 Check the FAQ tab first — your question might already be answered there. If not, send your query below. Admin typically replies within 24-48 hours.
            </div>
            {querySent&&<div style={{background:'var(--okp)',border:'1px solid rgba(34,197,94,.2)',borderRadius:'var(--r1)',padding:'12px',marginBottom:14,fontSize:13,color:'var(--ok)',fontWeight:500}}>✅ Query sent! Admin will reply within 24-48 hours.</div>}
            <div className="field">
              <label className="label">Your Question</label>
              <textarea className="input" value={queryText} onChange={e=>setQueryText(e.target.value)} placeholder="Describe your issue or question in detail. The more specific you are, the better the admin can help." style={{minHeight:120,resize:'vertical'}}/>
            </div>
            <button className="btn btn-primary btn-full" onClick={sendQuery} disabled={!queryText.trim()}>Send to Admin →</button>

            {/* My previous queries */}
            {myQueries.length>0&&(
              <div style={{marginTop:24}}>
                <div className="sh" style={{padding:'0 0 10px'}}><span className="sh-title">Your Previous Queries</span></div>
                {myQueries.map(q=>(
                  <div key={q.id} style={{background:'var(--s)',border:'1px solid var(--bo)',borderRadius:'var(--r2)',padding:'12px',marginBottom:8}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                      <div style={{fontSize:11,color:'var(--mu)'}}>{new Date(q.createdAt).toLocaleDateString('en-IN')}</div>
                      <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:4,background:q.status==='open'?'rgba(245,158,11,.15)':q.status==='replied'?'var(--okp)':'var(--s2)',color:q.status==='open'?'var(--wa)':q.status==='replied'?'var(--ok)':'var(--mu)'}}>{q.status.toUpperCase()}</span>
                    </div>
                    <div style={{fontSize:13,color:'var(--tx)',marginBottom:q.adminReply?8:0,lineHeight:1.5}}>{q.question}</div>
                    {q.adminReply&&<div style={{background:'var(--ap)',borderRadius:'var(--r1)',padding:'8px 10px',fontSize:12.5,color:'var(--ac)',lineHeight:1.55}}>
                      <strong>Admin:</strong> {q.adminReply}
                    </div>}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
        <div style={{height:20}}/>
      </div>
      {guideId&&<APIGuideModal apiId={guideId} onClose={()=>setGuideId(null)}/>}
    </>
  );
}

// ── CREDIT DAYS ADMIN MANAGER ─────────────────────────────────────────
function CreditDaysManager(){
  const[users,setUsers]=useState(()=>Object.values(UDB.all()).filter(u=>!u.isAdmin&&u.status==='active'));
  const[selected,setSelected]=useState(new Set());
  const[days,setDays]=useState(14);
  const[applied,setApplied]=useState('');

  const toggle=e=>{const s=new Set(selected);if(s.has(e))s.delete(e);else s.add(e);setSelected(s);};
  const toggleAll=()=>selected.size===users.length?setSelected(new Set()):setSelected(new Set(users.map(u=>u.email)));

  const applyDays=async()=>{
    if(!selected.size){alert('Select at least one user.');return;}
    for(const email of selected){
      const u=UDB.get(email);if(!u)continue;
      const old=u.creditDays??DAILY_FREE_DEFAULT_DAYS;
      await UDB.set(email,{creditDays:days});
      const msg=days>old?`🎉 Your free daily credits have been extended to ${days===9999?'unlimited':days+' days'} by the admin!`:`ℹ Your free credit period has been updated to ${days} days by the admin.`;
      UserNotifs.add(email,msg,'credit');
    }
    setApplied(`Applied to ${selected.size} user${selected.size!==1?'s':''}. Notifications sent.`);
    setUsers(Object.values(UDB.all()).filter(u=>!u.isAdmin&&u.status==='active'));
    setSelected(new Set());
    setTimeout(()=>setApplied(''),3000);
  };

  const daysLeft=u=>{
    const fl=u.firstLoginAt||u.registeredAt||Date.now();
    const cd=u.creditDays??DAILY_FREE_DEFAULT_DAYS;
    if(cd===9999)return'∞';
    return Math.max(0,cd-Math.floor((Date.now()-fl)/86400000))+'d';
  };

  return(
    <div>
      <div style={{background:'var(--ap)',border:'1px solid rgba(212,165,32,.2)',borderRadius:'var(--r2)',padding:'14px',marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,color:'var(--tx)',marginBottom:10}}>Set Free Credit Days</div>
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          <label style={{fontSize:12.5,color:'var(--mu)'}}>Days:</label>
          <select className="input" style={{width:110}} value={days} onChange={e=>setDays(+e.target.value)}>
            {[7,10,14,21,30,60,90,9999].map(d=><option key={d} value={d}>{d===9999?'Unlimited':d+' days'}</option>)}
          </select>
          <button className="btn btn-primary btn-sm" onClick={applyDays} disabled={!selected.size}>Apply to {selected.size||0} users</button>
        </div>
        {applied&&<div style={{fontSize:12,color:'var(--ok)',marginTop:8,fontWeight:500}}>✅ {applied}</div>}
      </div>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <button className="btn btn-ghost btn-sm" onClick={toggleAll}>{selected.size===users.length&&users.length>0?'Deselect All':'Select All'}</button>
        <span style={{fontSize:11,color:'var(--mu)'}}>{selected.size} selected</span>
      </div>

      {users.length===0?<div className="empty"><div className="empty-sub">No active users yet.</div></div>:
      users.map(u=>{
        const dl=daysLeft(u);
        const cd=u.creditDays??DAILY_FREE_DEFAULT_DAYS;
        return(
          <div key={u.email} onClick={()=>toggle(u.email)} style={{cursor:'pointer',display:'flex',alignItems:'center',gap:12,padding:'10px 12px',borderRadius:'var(--r1)',marginBottom:4,background:selected.has(u.email)?'var(--ap)':'var(--s)',border:`1px solid ${selected.has(u.email)?'rgba(212,165,32,.2)':'var(--bo)'}`}}>
            <input type="checkbox" checked={selected.has(u.email)} readOnly style={{accentColor:'var(--ac)',width:16,height:16,flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--tx)'}}>{u.name}</div>
              <div style={{fontSize:11,color:'var(--mu)'}}>{u.email}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:12,fontWeight:700,color:dl==='0d'?'var(--mu)':dl==='∞'?'var(--ac)':'var(--ok)'}}>{dl} left</div>
              <div style={{fontSize:10,color:'var(--mu)'}}>of {cd===9999?'∞':cd} days</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

  });
  const credits=useCredits();
  const plansConfig=LS.get('hm_plans_config',{newUserFlow:'manual'});

  // Apply theme on mount and changes
  useEffect(()=>{applyTheme(theme,isDark);},[theme,isDark]);
  useEffect(()=>{
    const mq=window.matchMedia('(prefers-color-scheme: dark)');
    const handler=e=>{
      if(LS.get('hm_dark')===null||LS.get('hm_dark')===undefined){
        setIsDark(e.matches);applyTheme(theme,e.matches);
      }
    };
    mq.addEventListener('change',handler);
    return()=>mq.removeEventListener('change',handler);
  },[]);
  // Daily credits
  useEffect(()=>{if(user?.status==='approved')Credits.checkDaily();},[user?.status]);

  const acceptTerms=()=>{LS.set('hm_terms',true);setTerms(true);};
  const handleLogin=u=>{
    // Record first login timestamp for credit days tracking
    const stored=UDB.get(u.email);
    if(!stored?.firstLoginAt){
      UDB.set(u.email,{firstLoginAt:Date.now()});
      u=Object.assign({},u,{firstLoginAt:Date.now()});
    }
    const updated={...stored,...u,firstLoginAt:stored?.firstLoginAt||Date.now()};
    LS.set('hm_user',updated);
    setUser(updated);
    if(updated.status==='active')Credits.checkDaily();
    // Show onboarding to new users only
    if(!LS.get('hm_onboarding_done'))setShowOnboarding(true);
  };
  const handleLogout=(reason)=>{
    LS.set('hm_user',null);
    setUser(null);
    setAdminMode(false);
    setTab('home');
    if(reason){ try{ sessionStorage.setItem('hm_logout_reason',reason); }catch(e){} }
  };

  // ── LIVE SUSPEND CHECK — re-verify account status on every interaction ──
  // If an admin suspends the account while the user is mid-session, this
  // catches it on their next click and logs them out instantly.
  const _lastStatusCheck=useRef(0);
  useEffect(()=>{
    if(!user||!user.email) return;
    let cancelled=false;
    async function checkStatus(){
      const now=Date.now();
      // Throttle: at most one DB check every 4 seconds, even on rapid clicks
      if(now-_lastStatusCheck.current<4000) return;
      _lastStatusCheck.current=now;
      try{
        const fresh=await UDB.getFresh(user.email);
        if(cancelled) return;
        if(fresh && fresh.status==='suspended'){
          handleLogout('suspended');
          setTimeout(()=>{ try{ window.alert('Your account has been suspended by the administrator. Please contact support if you believe this is a mistake.'); }catch(e){} },50);
        }
      }catch(e){ /* offline or transient — do not log out on network errors */ }
    }
    const onAnyClick=()=>{ checkStatus(); };
    document.addEventListener('click',onAnyClick,true);
    // Also check immediately when the tab regains focus
    const onFocus=()=>{ _lastStatusCheck.current=0; checkStatus(); };
    window.addEventListener('focus',onFocus);
    return()=>{
      cancelled=true;
      document.removeEventListener('click',onAnyClick,true);
      window.removeEventListener('focus',onFocus);
    };
  },[user]);
  const handleSplashDone=()=>{LS.set('hm_splash_shown',true);setShowSplash(false);};
  const updateUser=u=>{LS.set('hm_user',u);setUser(u);};

  const isAdminUser = UDB.isAdmin(user?.email);
  const pendingCount=Object.values(UDB.all()).filter(u=>u.status==='pending_admin').length + LS.get('hm_notifs',[]).filter(n=>!n.read).length;

  if(!termsAccepted) return(<><TermsModal onAccept={acceptTerms}/></>);
  if(showSplash) return(<><SplashScreen onDone={handleSplashDone}/></>);
  if(!user) return(<><AuthScreen onLogin={handleLogin}/></>);
  if(user.status==='suspended') return(<><RejectedScreen onReset={()=>{LS.set('hm_user',null);setUser(null);}}/></>);
  if(adminMode) return(<><AdminPanel onExit={()=>setAdminMode(false)}/></>);

  return(
    <>
      
      <CreditCtx.Provider value={credits}>
        <div className="app">
          {tab==='home'&&<HomeScreen user={user} onTabChange={setTab}/>}
          {tab==='search'&&<SearchScreen user={user}/>}
          {tab==='applications'&&<ApplicationsScreen/>}
          {tab==='resume'&&<ResumeScreen onTabChange={setTab}/>}
          {tab==='profile'&&(
            <ProfileScreen user={user} onUpdate={updateUser} onLogout={handleLogout}
              theme={theme} setTheme={setTheme} isDark={isDark} setIsDark={setIsDark}/>
          )}
          <BottomNav active={tab} onChange={t=>setTab(t)} pendingCount={pendingCount}/>
          {showOnboarding&&<OnboardingModal user={user} onDone={()=>setShowOnboarding(false)}/>}
        </div>
      </CreditCtx.Provider>
    </>
  );
}

// ── AUTH SCREEN ───────────────────────────────────────────────────────
function AuthScreen({onLogin}) {
  const [view,  setView]  = useState('login');   // login | register | verify | forgot | forgotverify
  const [email, setEmail] = useState('');
  const [pass,  setPass]  = useState('');
  const [pass2, setPass2] = useState('');
  const [name,  setName]  = useState('');
  const [code,  setCode]  = useState('');
  const [pendingCode, setPendingCode] = useState(null);
  const [simCode, setSimCode] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [msg, setMsg] = useState('');

  // Show a message if the user was just logged out because of suspension
  useEffect(()=>{
    try{
      const reason=sessionStorage.getItem('hm_logout_reason');
      if(reason==='suspended'){
        setErr('Your account has been suspended. Please contact support.');
        sessionStorage.removeItem('hm_logout_reason');
      }
    }catch(e){}
  },[]);

  function showErr(e) { setErr(e); setLoading(false); }

  // ── LOGIN ────────────────────────────────────────────────────────────
  async function doLogin() {
    if (!email || !pass) return showErr('Please enter your email and password.');
    setLoading(true); setErr('');
    try {
      // Cache may not be populated yet (fresh page load) — fall back to a direct cloud lookup
      let u = UDB.get(email) || (await UDB.getFresh(email));
      if (!u) { showErr('No account found. Please register first.'); setLoading(false); return; }
      if (u.status === 'suspended') { showErr('This account has been suspended.'); setLoading(false); return; }
      const h = await hashPwd(pass);
      if (h !== u.pwdHash) { showErr('Wrong password. Please try again.'); setLoading(false); return; }
      Credits.checkDaily();
      onLogin({...u, firstLoginAt: u.firstLoginAt || Date.now()});
    } catch(e) { showErr('Login failed — check your connection and try again.'); setLoading(false); }
  }

  // ── REGISTER STEP 1 — send code ───────────────────────────────────
  async function doRegisterStep1() {
    if (!name.trim()) return showErr('Please enter your full name.');
    const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRx.test(email)) return showErr('Please enter a valid email address.');
    setLoading(true); setErr('');
    // Check cache first (fast), fall back to a direct cloud lookup if cache hasn't synced yet
    const existing = UDB.get(email) || (await UDB.getFresh(email));
    if (existing) { showErr('An account with this email already exists. Please login.'); setLoading(false); return; }
    const code6 = String(Math.floor(100000 + Math.random() * 900000));
    setPendingCode(code6);
    // Try to send email
    const sent = await EmailAPIs.sendCode(email, code6, 'register');
    if (!sent) setSimCode(code6); // show on screen if no email API
    setLoading(false);
    setView('verify');
    setMsg('A 6-digit verification code has been sent to your email.');
  }

  // ── REGISTER STEP 2 — verify code ─────────────────────────────────
  function doVerifyCode() {
    if (code.trim() !== pendingCode) return showErr('Wrong code. Please check your email and try again.');
    setErr(''); setView('setpass');
  }

  // ── REGISTER STEP 3 — set password ────────────────────────────────
  async function doSetPassword() {
    if (pass.length < 8) return showErr('Password must be at least 8 characters.');
    if (pass !== pass2) return showErr('Passwords do not match.');
    setLoading(true); setErr('');
    try {
      const h = await hashPwd(pass);
      const newUser = {
        name: name.trim(), email: email.toLowerCase().trim(),
        pwdHash: h, status: 'active', plan: 'free',
        isAdmin: false, // admin status only via seed or explicit promotion, never auto-granted
        registeredAt: Date.now(), firstLoginAt: Date.now(), creditDays: 14,
      };
      const saved = await UDB.set(email, newUser);
      Credits.checkDaily();
      onLogin(saved || newUser);
    } catch(e) { showErr('Could not save your account — check your connection and try again.'); }
    finally { setLoading(false); }
  }

  // ── FORGOT PASSWORD ────────────────────────────────────────────────
  async function doForgotSend() {
    if (!email) return showErr('Please enter your email address.');
    const u = UDB.get(email);
    if (!u) return showErr('No account found with this email.');
    setLoading(true);
    const code6 = String(Math.floor(100000 + Math.random() * 900000));
    setPendingCode(code6);
    const sent = await EmailAPIs.sendCode(email, code6, 'reset');
    if (!sent) setSimCode(code6);
    setLoading(false);
    setView('forgotverify');
    setMsg('A reset code has been sent to your email.');
  }

  async function doForgotReset() {
    if (code.trim() !== pendingCode) return showErr('Wrong code. Please try again.');
    if (pass.length < 8) return showErr('Password must be at least 8 characters.');
    if (pass !== pass2) return showErr('Passwords do not match.');
    setLoading(true);
    try {
      const h = await hashPwd(pass);
      const u = UDB.get(email) || (await UDB.getFresh(email));
      if (!u) { showErr('Account not found.'); setLoading(false); return; }
      await UDB.set(email, {...u, pwdHash: h});
      setLoading(false);
      setMsg('Password reset! Please login with your new password.');
      setView('login'); setPass(''); setPass2(''); setCode('');
    } catch(e) { showErr('Reset failed — check your connection and try again.'); setLoading(false); }
  }

  const inp = {
    style: {
      width:'100%', padding:'14px 16px', borderRadius:'12px',
      border:'1.5px solid rgba(255,255,255,.15)', background:'rgba(255,255,255,.08)',
      color:'white', fontSize:'16px', fontFamily:'inherit', outline:'none',
      marginBottom:'12px', boxSizing:'border-box',
    }
  };
  const btn = (bg='#3dbfa0') => ({
    style: {
      width:'100%', padding:'15px', borderRadius:'50px', border:'none',
      background: loading ? 'rgba(61,191,160,.5)' : bg,
      color:'white', fontSize:'16px', fontWeight:'700',
      fontFamily:'inherit', cursor: loading ? 'not-allowed' : 'pointer',
      marginTop:'8px', transition:'all .2s',
    }
  });

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#081535 0%,#0e2550 50%,#1b3f7d 100%)',
                 display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px'}}>
      {/* Logo */}
      <div style={{textAlign:'center',marginBottom:'32px'}}>
        <div style={{fontSize:'40px',marginBottom:'8px'}}>✦</div>
        <div style={{fontFamily:'sans-serif',fontWeight:'900',fontSize:'28px',color:'white',letterSpacing:'-1px'}}>
          opta<span style={{color:'#3dbfa0'}}>job</span>
        </div>
        <div style={{color:'rgba(255,255,255,.5)',fontSize:'13px',marginTop:'4px'}}>Choose Your Job</div>
      </div>

      {/* Card */}
      <div style={{background:'rgba(255,255,255,.07)',backdropFilter:'blur(16px)',
                   borderRadius:'24px',padding:'32px 28px',width:'100%',maxWidth:'400px',
                   border:'1px solid rgba(255,255,255,.12)'}}>

        {/* Tab switcher — login/register only */}
        {(view==='login'||view==='register') && (
          <div style={{display:'flex',background:'rgba(0,0,0,.3)',borderRadius:'12px',padding:'4px',marginBottom:'24px'}}>
            {['login','register'].map(v=>(
              <div key={v} onClick={()=>{setView(v);setErr('');setMsg('');}}
                style={{flex:1,padding:'10px',textAlign:'center',borderRadius:'8px',cursor:'pointer',
                        fontWeight:'600',fontSize:'14px',fontFamily:'sans-serif',transition:'all .2s',
                        background:view===v?'rgba(61,191,160,.25)':'transparent',
                        color:view===v?'#5dd4b8':'rgba(255,255,255,.5)',
                        textTransform:'capitalize'}}>
                {v==='login'?'Login':'Register'}
              </div>
            ))}
          </div>
        )}

        {/* Title for sub-views */}
        {view==='verify'     && <div style={{color:'#5dd4b8',fontWeight:'700',fontSize:'17px',fontFamily:'sans-serif',marginBottom:'16px'}}>📧 Verify Your Email</div>}
        {view==='setpass'    && <div style={{color:'#5dd4b8',fontWeight:'700',fontSize:'17px',fontFamily:'sans-serif',marginBottom:'16px'}}>🔒 Create Password</div>}
        {view==='forgot'     && <div style={{color:'#5dd4b8',fontWeight:'700',fontSize:'17px',fontFamily:'sans-serif',marginBottom:'16px'}}>🔑 Reset Password</div>}
        {view==='forgotverify'&&<div style={{color:'#5dd4b8',fontWeight:'700',fontSize:'17px',fontFamily:'sans-serif',marginBottom:'16px'}}>🔑 Enter Reset Code</div>}

        {/* Error / success messages */}
        {err && <div style={{background:'rgba(239,68,68,.15)',border:'1px solid rgba(239,68,68,.3)',
                              borderRadius:'10px',padding:'12px',color:'#fca5a5',fontSize:'13px',
                              marginBottom:'14px',fontFamily:'sans-serif'}}>{err}</div>}
        {msg && <div style={{background:'rgba(61,191,160,.15)',border:'1px solid rgba(61,191,160,.3)',
                              borderRadius:'10px',padding:'12px',color:'#5dd4b8',fontSize:'13px',
                              marginBottom:'14px',fontFamily:'sans-serif'}}>{msg}</div>}

        {/* Simulated email code (dev mode) */}
        {simCode && <div style={{background:'rgba(245,158,11,.15)',border:'1px solid rgba(245,158,11,.3)',
                                  borderRadius:'10px',padding:'14px',marginBottom:'14px'}}>
          <div style={{color:'#fbbf24',fontWeight:'700',fontSize:'12px',fontFamily:'sans-serif',marginBottom:'4px'}}>
            📱 DEV MODE — Your code:
          </div>
          <div style={{color:'white',fontWeight:'900',fontSize:'28px',letterSpacing:'8px',fontFamily:'monospace',textAlign:'center'}}>
            {simCode}
          </div>
          <div style={{color:'rgba(255,255,255,.5)',fontSize:'11px',fontFamily:'sans-serif',textAlign:'center',marginTop:'4px'}}>
            (Add email API in Admin to send real codes)
          </div>
        </div>}

        {/* ── LOGIN VIEW ── */}
        {view==='login' && <>
          <input {...inp} type="email"    value={email} onChange={e=>setEmail(e.target.value)}    placeholder="Email address" />
          <input {...inp} type="password" value={pass}  onChange={e=>setPass(e.target.value)}     placeholder="Password"
                 onKeyDown={e=>e.key==='Enter'&&doLogin()} />
          <button {...btn()} onClick={doLogin} disabled={loading}>
            {loading ? 'Logging in...' : 'Login →'}
          </button>
          <div onClick={()=>{setView('forgot');setErr('');setMsg('');}}
               style={{color:'rgba(255,255,255,.4)',fontSize:'13px',textAlign:'center',
                       marginTop:'14px',cursor:'pointer',fontFamily:'sans-serif'}}>
            Forgot password?
          </div>
        </>}

        {/* ── REGISTER VIEW ── */}
        {view==='register' && <>
          <input {...inp} type="text"  value={name}  onChange={e=>setName(e.target.value)}  placeholder="Full name" />
          <input {...inp} type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email address" />
          <button {...btn()} onClick={doRegisterStep1} disabled={loading}>
            {loading ? 'Sending code...' : 'Send Verification Code →'}
          </button>
        </>}

        {/* ── VERIFY CODE VIEW ── */}
        {view==='verify' && <>
          <input {...inp} type="text" value={code} onChange={e=>setCode(e.target.value)}
                 placeholder="6-digit code" maxLength="6"
                 style={{...inp.style, textAlign:'center', fontSize:'24px', letterSpacing:'8px'}} />
          <button {...btn()} onClick={doVerifyCode}>Verify Code →</button>
          <div onClick={()=>setView('register')}
               style={{color:'rgba(255,255,255,.4)',fontSize:'13px',textAlign:'center',
                       marginTop:'12px',cursor:'pointer',fontFamily:'sans-serif'}}>
            ← Back
          </div>
        </>}

        {/* ── SET PASSWORD VIEW ── */}
        {view==='setpass' && <>
          <input {...inp} type="password" value={pass}  onChange={e=>setPass(e.target.value)}  placeholder="Create password (min 8 chars)" />
          <input {...inp} type="password" value={pass2} onChange={e=>setPass2(e.target.value)} placeholder="Confirm password"
                 onKeyDown={e=>e.key==='Enter'&&doSetPassword()} />
          <button {...btn()} onClick={doSetPassword} disabled={loading}>
            {loading ? 'Creating account...' : 'Create Account →'}
          </button>
        </>}

        {/* ── FORGOT PASSWORD ── */}
        {view==='forgot' && <>
          <input {...inp} type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Your email address" />
          <button {...btn()} onClick={doForgotSend} disabled={loading}>
            {loading ? 'Sending...' : 'Send Reset Code →'}
          </button>
          <div onClick={()=>setView('login')}
               style={{color:'rgba(255,255,255,.4)',fontSize:'13px',textAlign:'center',
                       marginTop:'12px',cursor:'pointer',fontFamily:'sans-serif'}}>
            ← Back to Login
          </div>
        </>}

        {/* ── FORGOT VERIFY + RESET ── */}
        {view==='forgotverify' && <>
          <input {...inp} type="text" value={code} onChange={e=>setCode(e.target.value)}
                 placeholder="6-digit reset code" maxLength="6"
                 style={{...inp.style,textAlign:'center',fontSize:'24px',letterSpacing:'8px'}} />
          <input {...inp} type="password" value={pass}  onChange={e=>setPass(e.target.value)}  placeholder="New password" />
          <input {...inp} type="password" value={pass2} onChange={e=>setPass2(e.target.value)} placeholder="Confirm new password" />
          <button {...btn()} onClick={doForgotReset} disabled={loading}>
            {loading ? 'Resetting...' : 'Reset Password →'}
          </button>
        </>}

      </div>

      <div style={{color:'rgba(255,255,255,.25)',fontSize:'11px',textAlign:'center',
                   marginTop:'24px',fontFamily:'sans-serif',lineHeight:'1.6'}}>
        By continuing you agree to our Terms of Service.<br/>Made by Udit Tandon · optajob.com
      </div>
    </div>
  );
}



class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,i){console.error('App crash:',e,i);}
  render(){
    if(this.state.err)return(
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
        height:'100vh',background:'#0e2550',color:'white',padding:'24px',fontFamily:'sans-serif',textAlign:'center'}}>
        <div style={{fontSize:'48px',marginBottom:'12px'}}>⚠️</div>
        <h2 style={{color:'#3dbfa0',marginBottom:'8px'}}>Something went wrong</h2>
        <p style={{color:'rgba(255,255,255,.6)',marginBottom:'24px',fontSize:'13px'}}>
          {this.state.err.toString()}
        </p>
        <button onClick={()=>window.location.reload()}
          style={{background:'#3dbfa0',color:'white',border:'none',padding:'14px 32px',
            borderRadius:'50px',fontSize:'16px',fontWeight:'700',cursor:'pointer'}}>
          🔄 Refresh App
        </button>
      </div>
    );
    return this.props.children;
  }
}
const _r=document.getElementById('root');
const _root=ReactDOM.createRoot(_r);
_root.render(React.createElement(ErrorBoundary,null,React.createElement(App)));
</script>
