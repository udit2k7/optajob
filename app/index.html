<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0e2550">
  <title>OptaJob — Choose Your Job</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body,#root{height:100%;width:100%;overflow:hidden;background:#0e2550;}
    body{font-family:'Poppins',sans-serif;overscroll-behavior:none;}
    #root{height:100vh;display:flex;flex-direction:column;}
    input,textarea,select{font-size:16px!important;}
    
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&family=Poppins:wght@600;700&display=swap');
:root{--bg:#08121e;--s:#0d1c30;--s2:#132540;--ac:#d4a520;--ap:rgba(212,165,32,.12);--pr:#2563a8;--tx:#e2eaf5;--sb:#7ea8cc;--mu:#456080;--bo:rgba(226,234,245,.08);--bs:rgba(226,234,245,.15);--ok:#22c55e;--er:#ef4444;--wa:#f59e0b;--okp:rgba(34,197,94,.12);--erp:rgba(239,68,68,.12);--r1:6px;--r2:12px;--r3:18px;--r4:24px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
.app{height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px;}
.screen::-webkit-scrollbar{display:none;}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;height:64px;padding-bottom:env(safe-area-inset-bottom,0);background:var(--s);border-top:1px solid var(--bo);display:flex;z-index:100;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;position:relative;transition:color .2s;color:var(--mu);border:none;background:transparent;}
.bnav-item.on{color:var(--ac);}
.bnav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.bnav-item span{font-size:10px;font-weight:500;letter-spacing:.02em;}
.bnav-pip{position:absolute;top:8px;right:calc(50% - 14px);width:8px;height:8px;border-radius:50%;background:var(--er);border:2px solid var(--s);}

/* ── TOPBAR ── */
.topbar{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--s);border-bottom:1px solid var(--bo);}
.topbar-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--tx);}
.topbar-sub{font-size:12px;color:var(--mu);margin-top:1px;}
.topbar-actions{display:flex;gap:8px;align-items:center;}

/* ── CARDS ── */
.card{background:var(--s);border:1px solid var(--bo);border-radius:var(--r2);padding:16px;}
.card+.card{margin-top:10px;}
.card-sm{background:var(--s);border:1px solid var(--bo);border-radius:var(--r1);padding:12px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--r1);font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap;outline:none;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--ac);color:#000;padding:12px 20px;font-size:14px;}
.btn-primary:hover{opacity:.9;}
.btn-ghost{background:transparent;color:var(--sb);border:1px solid var(--bo);padding:10px 16px;font-size:13px;}
.btn-ghost:hover{border-color:var(--bs);color:var(--tx);}
.btn-danger{background:var(--erp);color:var(--er);border:1px solid rgba(239,68,68,.2);padding:10px 16px;font-size:13px;}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:var(--r1);}
.btn-icon{width:38px;height:38px;border-radius:var(--r1);padding:0;}
.btn-full{width:100%;}
.btn-outline-accent{background:var(--ap);color:var(--ac);border:1px solid rgba(212,165,32,.2);padding:10px 16px;font-size:13px;}

/* ── INPUTS ── */
.input{width:100%;background:var(--s2);border:1px solid var(--bo);border-radius:var(--r1);color:var(--tx);font-family:'Inter',sans-serif;font-size:14px;padding:12px 14px;outline:none;transition:border-color .18s;}
.input:focus{border-color:var(--ac);}
.input::placeholder{color:var(--mu);}
.input-lg{padding:14px 16px;font-size:15px;border-radius:var(--r2);}
.label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:6px;display:block;}
.field{margin-bottom:14px;}

/* ── BADGES / PILLS ── */
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;}
.pill-accent{background:var(--ap);color:var(--ac);border:1px solid rgba(212,165,32,.2);}
.pill-ok{background:var(--okp);color:var(--ok);border:1px solid rgba(34,197,94,.2);}
.pill-err{background:var(--erp);color:var(--er);}
.pill-muted{background:var(--s2);color:var(--mu);border:1px solid var(--bo);}
.pill-primary{background:rgba(37,99,168,.15);color:var(--pr);border:1px solid rgba(37,99,168,.25);}

/* ── CHIPS (filter) ── */
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:6px 14px;border-radius:20px;font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid var(--bo);background:transparent;color:var(--mu);transition:all .15s;font-family:'Inter',sans-serif;}
.chip:hover{border-color:var(--bs);color:var(--tx);}
.chip.on{background:var(--ap);border-color:var(--ac);color:var(--ac);font-weight:600;}

/* ── TOGGLE ── */
.tog{width:44px;height:24px;border-radius:12px;cursor:pointer;flex-shrink:0;position:relative;transition:background .22s;}
.tog-off{background:var(--bo);}
.tog-on{background:var(--ac);}
.tog-thumb{position:absolute;top:3px;width:18px;height:18px;border-radius:9px;background:#fff;transition:left .22s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.tog-thumb-off{left:3px;}
.tog-thumb-on{left:23px;}

/* ── SECTION HEADERS ── */
.sh{padding:20px 20px 10px;display:flex;align-items:center;justify-content:space-between;}
.sh-title{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);}
.sh-action{font-size:12px;color:var(--ac);cursor:pointer;font-weight:500;}
.px{padding-left:20px;padding-right:20px;}
.py{padding-top:12px;padding-bottom:12px;}

/* ── JOB CARD ── */
.jcard{background:var(--s);border:1px solid var(--bo);border-radius:var(--r2);overflow:hidden;transition:border-color .2s;}
.jcard+.jcard{margin-top:10px;}
.jcard:hover{border-color:var(--bs);}
.jcard.unlocked{border-color:rgba(212,165,32,.3);}
.jcard-top{padding:16px 16px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.jcard-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--tx);line-height:1.3;margin-bottom:3px;}
.jcard-company{font-size:12.5px;font-weight:600;color:var(--ac);margin-bottom:10px;}
.jcard-meta{padding:0 16px 12px;display:flex;flex-wrap:wrap;gap:5px;}
.jmeta{font-size:11px;padding:3px 9px;border-radius:4px;font-weight:500;}
.jmeta-loc{background:rgba(37,99,168,.12);color:var(--pr);}
.jmeta-type{background:var(--s2);color:var(--mu);}
.jmeta-sal{background:var(--okp);color:var(--ok);}
.jmeta-plat{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;border:1px solid var(--bo);color:var(--mu);}

/* ── MATCH BAR ── */
.mbar-wrap{padding:10px 16px;border-top:1px solid var(--bo);display:flex;align-items:center;gap:10px;}
.mbar-track{flex:1;height:4px;background:var(--s2);border-radius:2px;overflow:hidden;}
.mbar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--ok),var(--ac));}
.mbar-pct{font-size:12px;font-weight:600;color:var(--ok);}

/* ── JOB ACTIONS ── */
.jactions{padding:12px 16px;border-top:1px solid var(--bo);display:flex;gap:8px;flex-wrap:wrap;background:var(--s2);}
.jactions-ai{padding:10px 16px 12px;border-top:1px solid var(--bo);display:flex;gap:6px;flex-wrap:wrap;background:var(--s2);}

/* ── AD BANNER ── */
.ad-wrap{margin:10px 20px;background:var(--s2);border:1px dashed var(--bo);border-radius:var(--r1);padding:10px 14px;display:flex;align-items:center;gap:10px;}
.ad-tag{font-size:9px;font-weight:700;letter-spacing:.1em;padding:2px 6px;border-radius:3px;background:var(--ap);color:var(--ac);flex-shrink:0;}
.ad-text{flex:1;font-size:12px;color:var(--mu);}
.ad-prog{height:3px;background:var(--bo);border-radius:2px;overflow:hidden;margin-top:6px;}
.ad-prog-fill{height:100%;background:var(--ac);transition:width 1s linear;}

/* ── CREDIT CARD ── */
.cred-card{background:var(--s);border:1px solid var(--bo);border-radius:var(--r2);padding:16px;margin:0 20px 10px;}
.cred-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.cred-box{background:var(--s2);border-radius:var(--r1);padding:12px;text-align:center;}
.cred-num{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1;}
.cred-lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-top:3px;}
.cred-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bo);font-size:12px;}
.cred-row:last-child{border-bottom:none;}

/* ── PROFILE / SETTINGS ── */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bo);cursor:pointer;}
.setting-row:hover{background:var(--s2);}
.setting-row:active{background:var(--s2);}
.setting-label{font-size:14px;color:var(--tx);font-weight:500;}
.setting-sub{font-size:11.5px;color:var(--mu);margin-top:2px;}
.setting-right{display:flex;align-items:center;gap:8px;color:var(--mu);}

/* ── THEME PICKER ── */
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 20px;}
.theme-tile{border-radius:var(--r2);overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s;}
.theme-tile.on{border-color:var(--ac);}
.theme-preview{height:48px;display:flex;align-items:center;justify-content:center;gap:6px;}
.theme-dot{width:12px;height:12px;border-radius:50%;}
.theme-info{padding:8px 10px;background:var(--s);}
.theme-name{font-size:12px;font-weight:600;color:var(--tx);}
.theme-desc{font-size:10.5px;color:var(--mu);}

/* ── RESUME SLOTS ── */
.rslot{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--s2);border-radius:var(--r1);border:1px solid var(--bo);margin-bottom:8px;}
.rslot-icon{width:36px;height:36px;border-radius:var(--r1);background:var(--ap);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rslot-name{font-size:13px;font-weight:600;color:var(--tx);}
.rslot-meta{font-size:11px;color:var(--mu);margin-top:2px;}

/* ── AUTH ── */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.auth-card{background:var(--s);border:1px solid var(--bo);border-radius:var(--r3);padding:28px;width:100%;max-width:400px;}
.auth-brand{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--tx);display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.auth-mark{width:32px;height:32px;border-radius:8px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:16px;}
.auth-sub{font-size:13px;color:var(--mu);margin-bottom:22px;line-height:1.55;}
.auth-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--s2);border-radius:var(--r1);padding:3px;}
.auth-tab{flex:1;padding:9px;border-radius:calc(var(--r1) - 2px);font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'Inter',sans-serif;background:transparent;color:var(--mu);transition:all .18s;}
.auth-tab.on{background:var(--s);color:var(--tx);font-weight:600;}

/* ── TC MODAL ── */
.tc-wrap{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;justify-content:center;}
.tc-sheet{background:var(--s);border-radius:var(--r3) var(--r3) 0 0;width:100%;max-width:500px;max-height:90vh;display:flex;flex-direction:column;}
.tc-drag{width:40px;height:4px;background:var(--bs);border-radius:2px;margin:12px auto 0;}
.tc-head{padding:16px 20px;border-bottom:1px solid var(--bo);}
.tc-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:2px;}
.tc-body{flex:1;overflow-y:auto;padding:16px 20px;font-size:13px;line-height:1.7;color:var(--sb);}
.tc-body h4{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin:16px 0 6px;}
.tc-body p{margin-bottom:10px;}
.tc-check-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-top:1px solid var(--bo);}
.tc-check-item input{margin-top:2px;accent-color:var(--ac);width:16px;height:16px;flex-shrink:0;cursor:pointer;}
.tc-check-item label{font-size:13px;color:var(--sb);cursor:pointer;line-height:1.5;}
.tc-foot{padding:16px 20px;border-top:1px solid var(--bo);}

/* ── LOADING ── */
.skel{background:var(--s2);border-radius:var(--r1);animation:shimmer 1.4s ease infinite;}
@keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}
.spin{width:20px;height:20px;border:2px solid var(--bo);border-top-color:var(--ac);border-radius:50%;animation:rot .7s linear infinite;display:inline-block;}
@keyframes rot{to{transform:rotate(360deg)}}
.loading-wrap{padding:48px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;}

/* ── EMPTY STATE ── */
.empty{padding:48px 20px;text-align:center;}
.empty-icon{font-size:40px;margin-bottom:14px;}
.empty-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:8px;}
.empty-sub{font-size:13.5px;color:var(--mu);line-height:1.6;max-width:280px;margin:0 auto 20px;}

/* ── WAITING ── */
.wait-icon{width:72px;height:72px;border-radius:50%;background:var(--ap);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;}
.wait-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;text-align:center;margin-bottom:8px;}
.wait-sub{font-size:13.5px;color:var(--mu);text-align:center;line-height:1.65;margin-bottom:24px;}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--bo);margin:4px 0;}

/* ── MODAL ── */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:var(--s);border-radius:var(--r3) var(--r3) 0 0;width:100%;max-width:540px;max-height:88vh;display:flex;flex-direction:column;}
.modal-drag{width:40px;height:4px;background:var(--bs);border-radius:2px;margin:12px auto 0;}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--bo);display:flex;align-items:flex-start;justify-content:space-between;}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;}
.modal-sub{font-size:12px;color:var(--mu);margin-top:2px;}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px;}
.modal-tabs{display:flex;gap:4px;margin:12px 20px 0;background:var(--s2);border-radius:var(--r1);padding:3px;}
.mtab{flex:1;padding:8px;border-radius:calc(var(--r1) - 2px);font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:'Inter',sans-serif;background:transparent;color:var(--mu);transition:all .15s;}
.mtab.on{background:var(--s);color:var(--tx);font-weight:600;}
.modal-foot{padding:14px 20px;border-top:1px solid var(--bo);display:flex;gap:8px;}

/* ── HOME HERO ── */
.hero{padding:20px 20px 14px;background:var(--s);border-bottom:1px solid var(--bo);}
.hero-greeting{font-size:13px;color:var(--mu);margin-bottom:4px;}
.hero-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--tx);}
.hero-credits{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}

/* ── SEARCH BAR ── */
.search-bar{display:flex;align-items:center;gap:10px;padding:14px 20px;position:sticky;top:0;background:var(--s);border-bottom:1px solid var(--bo);z-index:10;}
.search-input-wrap{flex:1;position:relative;}
.search-input-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--mu);pointer-events:none;}
.search-input{background:var(--s2);border:1px solid var(--bo);border-radius:var(--r2);color:var(--tx);font-family:'Inter',sans-serif;font-size:14px;padding:11px 14px 11px 38px;width:100%;outline:none;transition:border-color .18s;}
.search-input:focus{border-color:var(--ac);}
.search-input::placeholder{color:var(--mu);}

/* ── STATUS BAR ── */
.status-bar{display:flex;align-items:center;gap:10px;padding:12px 20px;font-size:12.5px;color:var(--mu);background:var(--s2);border-bottom:1px solid var(--bo);}

/* ── DANGER ZONE ── */
.danger-card{background:var(--erp);border:1px solid rgba(239,68,68,.2);border-radius:var(--r2);padding:16px;margin:10px 20px;}
.danger-title{font-size:13px;font-weight:600;color:var(--er);margin-bottom:6px;}

/* ── ADMIN ── */
.admin-tabs{display:flex;gap:4px;padding:12px 20px;overflow-x:auto;}
.admin-tabs::-webkit-scrollbar{display:none;}
.atab{padding:8px 16px;border-radius:20px;font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid var(--bo);background:transparent;color:var(--mu);transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap;flex-shrink:0;}
.atab.on{background:var(--ac);border-color:var(--ac);color:#000;font-weight:600;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 20px;margin-bottom:14px;}
.stat-box{background:var(--s2);border-radius:var(--r1);padding:14px;text-align:center;}
.stat-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1;}
.stat-lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--mu);margin-top:4px;}
.code-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--bo);}
.code-key{font-family:monospace;font-size:15px;font-weight:700;letter-spacing:.05em;color:var(--tx);flex:1;}
.gen-box{background:var(--ap);border:1.5px solid rgba(212,165,32,.2);border-radius:var(--r1);padding:12px 14px;margin-top:8px;display:flex;align-items:center;gap:10px;}
.gen-key{font-family:monospace;font-size:17px;font-weight:700;letter-spacing:.06em;color:var(--ac);flex:1;}
.user-row{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--bo);}
.user-email{font-size:13px;font-weight:600;color:var(--tx);}
.user-meta{font-size:11px;color:var(--mu);margin-top:2px;}

/* ── AVATAR PICKER ── */
.avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:12px 0;}
.avatar-cell{width:48px;height:48px;border-radius:50%;cursor:pointer;border:3px solid transparent;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.avatar-cell.sel{border-color:var(--ac);box-shadow:0 0 0 2px var(--ap);}
.avatar-cell:hover{transform:scale(1.1);}

/* ── TRACK TAB ── */
.track-tabs{display:flex;gap:0;background:var(--s2);border-radius:var(--r2);padding:3px;margin:0 16px 12px;}
.track-tab{flex:1;padding:7px 4px;border-radius:calc(var(--r2) - 2px);text-align:center;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--mu);}
.track-tab.on{background:var(--s);color:var(--tx);box-shadow:0 1px 4px rgba(0,0,0,.15);}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.status-applied{background:rgba(59,130,246,.15);color:#3b82f6;}
.status-interview{background:rgba(245,158,11,.15);color:var(--wa);}
.status-offer{background:rgba(34,197,94,.15);color:var(--ok);}
.status-rejected{background:rgba(239,68,68,.15);color:var(--er);}

/* ── SALARY FILTER CHIPS ── */
.salary-chips{display:flex;gap:6px;flex-wrap:wrap;padding:8px 16px;}
.salary-chip{padding:5px 10px;border-radius:14px;font-size:11.5px;font-weight:500;border:1px solid var(--bo);cursor:pointer;white-space:nowrap;transition:all .15s;color:var(--mu);background:var(--s);}
.salary-chip.on{background:var(--ap);color:var(--ac);border-color:var(--ac);font-weight:700;}

/* ── SORT / FILTER BAR ── */
.sort-bar{display:flex;gap:8px;padding:0 16px 8px;align-items:center;}
.sort-select{background:var(--s2);border:1px solid var(--bo);borderRadius:var(--r1);padding:5px 8px;font-size:12px;color:var(--tx);outline:none;}

/* ── DATE BADGE ── */
.date-badge{font-size:10.5px;color:var(--mu);display:flex;align-items:center;gap:3px;}
.date-badge.fresh{color:var(--ok);}
.date-badge.old{color:var(--er);}

/* ── FOLLOW-UP REMINDER ── */
.followup-bar{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:var(--r1);padding:8px 12px;display:flex;align-items:center;gap:8px;margin-top:8px;}

/* ── CREDIT PILL (combined) ── */
.credit-pill-combined{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--bo);border-radius:20px;padding:6px 14px;}
.credit-num{font-size:18px;font-weight:800;color:var(--ac);font-family:'Syne',sans-serif;line-height:1;}
.credit-days-left{font-size:10px;color:var(--mu);font-weight:500;}

/* ── AUTH SCREEN (new) ── */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--bg);}
.auth-card{background:var(--s);border:1px solid var(--bo);border-radius:var(--r3);padding:28px 24px;width:100%;max-width:400px;}

/* ── USER NOTIF BELL ── */
.notif-bell{position:relative;display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;cursor:pointer;background:var(--s2);border:1px solid var(--bo);}
.notif-dot{position:absolute;top:4px;right:4px;width:10px;height:10px;border-radius:50%;background:var(--er);border:2px solid var(--bg);}

/* ── CONTACT VENDOR CARD ── */
.vendor-card{background:var(--s);border:1px solid var(--bo);border-radius:var(--r2);padding:12px;margin-bottom:8px;}
.vendor-card.configured{border-color:rgba(34,197,94,.3);}
.conf-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.conf-high{background:rgba(34,197,94,.15);color:var(--ok);}
.conf-med{background:rgba(245,158,11,.15);color:var(--wa);}
.conf-low{background:rgba(239,68,68,.15);color:var(--er);}

/* ── INTERVIEW PREP TEASER ── */
.prep-teaser{background:linear-gradient(135deg,rgba(27,63,125,.3),rgba(61,191,160,.1));border:1px solid rgba(61,191,160,.2);border-radius:var(--r2);padding:14px;margin-top:8px;cursor:pointer;}


/* ── SPLASH SCREEN ── */
.splash{position:fixed;inset:0;z-index:9999;background:#0e2550;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
.splash-glow{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(61,191,160,.18) 0%,transparent 70%);opacity:0;transition:opacity .8s ease;}
.splash-glow.show{opacity:1;}
.splash-ghost2{position:absolute;opacity:0;filter:blur(1px);}
.splash-ghost2.show{opacity:.18;animation:logoSpinIn 2.45s cubic-bezier(.15,0,.1,1) both;}
.splash-ghost1{position:absolute;opacity:0;filter:blur(.5px);}
.splash-ghost1.show{opacity:.36;animation:logoSpinIn 2.22s cubic-bezier(.15,0,.1,1) both;}
.splash-icon{position:relative;z-index:2;opacity:0;}
.splash-icon.show{animation:logoSpinIn 2.0s cubic-bezier(.15,0,.1,1) forwards,logoSnap .38s cubic-bezier(.34,1.56,.64,1) 2.05s both;}
@keyframes logoSpinIn{0%{opacity:0;transform:rotate(540deg) scale(2.8);}10%{opacity:1;}100%{opacity:1;transform:rotate(0deg) scale(1.12);}}
@keyframes logoSnap{0%{transform:scale(1.12);}100%{transform:scale(1.0);}}
.splash-impact{position:absolute;z-index:3;opacity:0;pointer-events:none;width:240px;height:240px;}
.splash-impact.show{animation:impactBurst .55s ease-out 2.08s both;}
@keyframes impactBurst{0%{opacity:.85;transform:scale(.4);}55%{opacity:.5;transform:scale(1.7);}100%{opacity:0;transform:scale(2.5);}}
.splash-wordmark{display:flex;align-items:center;margin-top:16px;position:relative;z-index:2;}
.splash-opta{font-family:'Poppins',sans-serif;font-size:34px;font-weight:700;color:#fff;letter-spacing:-.03em;opacity:0;transform:translateX(-28px);transition:opacity .5s ease .1s,transform .5s cubic-bezier(.34,1.2,.64,1) .1s;}
.splash-job{font-family:'Poppins',sans-serif;font-size:34px;font-weight:700;color:var(--ok);letter-spacing:-.03em;opacity:0;transform:translateX(28px);transition:opacity .5s ease .2s,transform .5s cubic-bezier(.34,1.2,.64,1) .2s;}
.splash-job{color:#3dbfa0;}
.splash-wordmark.show .splash-opta,.splash-wordmark.show .splash-job{opacity:1;transform:translateX(0);}
.splash-tagline{font-size:14px;color:rgba(255,255,255,.4);margin-top:10px;letter-spacing:.04em;opacity:0;transform:translateY(12px);transition:opacity .5s ease,transform .5s ease;position:relative;z-index:2;font-family:'Poppins',sans-serif;}
.splash-tagline.show{opacity:1;transform:translateY(0);}
.splash-dots{display:flex;gap:6px;margin-top:36px;opacity:0;transition:opacity .4s ease;}
.splash-dots.show{opacity:1;}
.splash-dot{width:6px;height:6px;border-radius:50%;background:#3dbfa0;opacity:.3;animation:dotPulse 1.4s ease-in-out infinite;}
.splash-dot:nth-child(2){animation-delay:.2s;}
.splash-dot:nth-child(3){animation-delay:.4s;}
@keyframes dotPulse{0%,80%,100%{opacity:.3;transform:scale(1);}40%{opacity:1;transform:scale(1.35);}}
.splash.fade-out{animation:splashOut .5s ease forwards;}
@keyframes splashOut{to{opacity:0;pointer-events:none;}}

/* ── ANIMATED LOADER (replaces spinner) ── */
.oj-loader{display:flex;flex-direction:column;align-items:center;gap:12px;}
.oj-loader-label{font-size:13px;color:var(--mu);font-family:'Inter',sans-serif;}
.loader-svg{animation:breathe 2.5s ease-in-out infinite;}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
.person-float{animation:personFloat 1.8s cubic-bezier(.4,0,.6,1) infinite;transform-origin:center;}
@keyframes personFloat{0%,100%{transform:translateY(0);}45%,55%{transform:translateY(-7px);}}
.arrow-glow{animation:arrowGlow 1.8s ease-in-out infinite;}
@keyframes arrowGlow{0%,100%{opacity:1;}50%{opacity:.6;}}
.travel-dot{animation:travelUp 1.8s cubic-bezier(.4,0,.6,1) infinite;}
@keyframes travelUp{0%{transform:translate(0,0) scale(0);opacity:0;}10%{opacity:1;transform:translate(0,0) scale(1);}85%{opacity:.8;transform:translate(58px,-64px) scale(.6);}100%{opacity:0;transform:translate(65px,-72px) scale(0);}}
.chevron-bounce{animation:chevBounce 2.4s cubic-bezier(.36,.07,.19,.97) infinite;transform-origin:44px 72px;}
@keyframes chevBounce{0%,70%,100%{transform:translateY(0);}80%{transform:translateY(-5px);}90%{transform:translateY(-2px);}}

/* Splash path draw animations */
.anim-arrow{stroke-dasharray:90;stroke-dashoffset:90;animation:drawArrow .7s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes drawArrow{to{stroke-dashoffset:0;}}

@keyframes popIn{to{opacity:1;transform:scale(1);}}
.anim-phead{opacity:0;transform-origin:45px 24px;transform:scale(0);animation:springIn .4s cubic-bezier(.34,1.8,.64,1) .3s forwards;}
@keyframes springIn{to{opacity:1;transform:scale(1);}}
.anim-pbody{stroke-dasharray:55;stroke-dashoffset:55;animation:drawBody .5s ease .5s forwards;}
@keyframes drawBody{to{stroke-dashoffset:0;}}
.anim-spd{stroke-dasharray:35;stroke-dashoffset:35;animation:drawLine .3s ease .7s forwards;}
@keyframes drawLine{to{stroke-dashoffset:0;}}
.anim-chev{stroke-dasharray:45;stroke-dashoffset:45;animation:drawChev .4s ease .75s forwards;}
@keyframes drawChev{to{stroke-dashoffset:0;}}

function applyTheme(themeId, isDark) {
  const p = PALETTES[themeId]?.[isDark?'dark':'light'] || PALETTES.navy.dark;
  const r = document.documentElement;
  const m = {bg:'--bg',surface:'--s',s2:'--s2',accent:'--ac',ap:'--ap',primary:'--pr',

}

// ── STORAGE ───────────────────────────────────────────────────────────
const LS = {

// ── SUPABASE — real cloud user database (replaces browser-only storage) ──
const SB_URL=atob('aHR0cHM6Ly9tbWhoaXNzdHJqa2Vzb3l3a2pwbi5zdXBhYmFzZS5jbw==');
const SB_KEY=atob('ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW0xdGFHaHBjM04wY21wclpYTnZlWGRyYW5CdUlpd2ljbTlzWlNJNkltRnViMjRpTENKcFlYUWlPakUzT0RFM09EQXdOVGdzSW1WNGNDSTZNakE1TnpNMU5qQTFPSDAuZVFJQUJIeUp5QlJxcFlwQWFIQnRjdDZGS3gyRE5DT1lYb3lTVkp4TTJzOA==');

// ── CREDITS SYSTEM (bugs fixed from v3) ─────────────────────────────
const EXPIRY_MS = 3*86400000;
const DAILY_FREE = 3;
const DAILY_FREE_DEFAULT_DAYS = 14; // free credits given for first N days

// ── CONTACT FINDER VENDORS ────────────────────────────────────────────
const CONTACT_VENDORS = {
  hunter:       { name:'Hunter.io',       free:'25/month',  link:'https://hunter.io/api',          keyPh:'Your Hunter.io key',  note:'Best known · Domain search · Email verify',    keyStore:'hm_ck_hunter' },
  apollo:       { name:'Apollo.io',        free:'50/month',  link:'https://developer.apollo.io',    keyPh:'Your Apollo API key', note:'Largest database · Sales intelligence',         keyStore:'hm_ck_apollo' },
  snov:         { name:'Snov.io',          free:'50/month',  link:'https://snov.io/api',            keyPh:'Your Snov.io key',    note:'LinkedIn finder + domain search',               keyStore:'hm_ck_snov' },
  skrapp:       { name:'Skrapp.io',        free:'100/month', link:'https://skrapp.io',              keyPh:'Your Skrapp key',     note:'Best free volume · 100/month',                  keyStore:'hm_ck_skrapp' },

// Get all configured (non-empty) contact vendor keys
const getConfiguredContactVendors = () =>
  Object.entries(CONTACT_VENDORS)
    .map(([id, meta]) => ({ id, ...meta, key: LS.get(meta.keyStore, '') }))
    .filter(v => v.key && v.id !== 'custom')
    .concat(
      LS.get('hm_ck_custom', '') ? [{ id: 'custom', ...CONTACT_VENDORS.custom, key: LS.get('hm_ck_custom', ''), endpoint: LS.get('hm_ck_custom_endpoint', '') }] : []
    );
const AD_CREDIT = 1;

const Credits = {
  get:()=>LS.get('hm_cb',[]),
  save:(b)=>LS.set('hm_cb',b),
  valid:(b)=>b.filter(x=>x.r>0&&x.e>Date.now()),
  total:()=>Credits.valid(Credits.get()).reduce((s,b)=>s+b.r,0),
  add:(n,type='ad')=>{
    const now=Date.now();
    const clean=Credits.valid(Credits.get());
    Credits.save([...clean,{id:now,a:n,r:n,type,e:now+EXPIRY_MS}]);
    return Credits.total();
  },
  consume:()=>{
    const all=Credits.get();
    const valid=Credits.valid(all).sort((a,b)=>a.e-b.e);
    if(!valid.length)return false;
    const target=valid[0];
    const updated=all.map(b=>b.id===target.id?{...b,r:b.r-1}:b).filter(b=>b.r>0||b.e<Date.now());
    Credits.save(updated.filter(b=>b.r>0)); // clean expired
    return true;
  },
  checkDaily:()=>{
    const today=new Date().toDateString();
    if(LS.get('hm_dlg','')=== today)return false;
    // Check if user is within their free credit days window
    const user=LS.get('hm_user',{});
    const firstLogin=user.firstLoginAt||user.registeredAt||Date.now();
    const creditDays=user.creditDays??DAILY_FREE_DEFAULT_DAYS;
    const daysSinceFirst=Math.floor((Date.now()-firstLogin)/86400000);
    LS.set('hm_dlg',today);
    if(daysSinceFirst>=creditDays)return false; // past free period
    Credits.add(DAILY_FREE,'daily');
    return true;
  },
  // Days remaining in free credit period
  freeDaysLeft:()=>{
    const user=LS.get('hm_user',{});
    const firstLogin=user.firstLoginAt||user.registeredAt||Date.now();
    const creditDays=user.creditDays??DAILY_FREE_DEFAULT_DAYS;
    const daysSinceFirst=Math.floor((Date.now()-firstLogin)/86400000);
    return Math.max(0,creditDays-daysSinceFirst);
  },
  dailyUsed:()=>{
    const d=LS.get('hm_dj',{date:'',u:0});
    return d.date===new Date().toDateString()?d.u:0;
  },
  useFree:()=>{
    const today=new Date().toDateString();
    const d=LS.get('hm_dj',{date:'',u:0});
    LS.set('hm_dj',{date:today,u:(d.date===today?d.u:0)+1});
  },
  hasFree:()=>Credits.dailyUsed()<DAILY_FREE,
  nextExp:()=>{const v=Credits.valid(Credits.get()).sort((a,b)=>a.e-b.e);return v[0]?.e||null;},
};

const CreditCtx = createContext(null);
function useCredits(){
  const [tot,setTot]=useState(()=>Credits.total());
  const [du,setDu]=useState(()=>Credits.dailyUsed());
  const [batches,setBatches]=useState(()=>Credits.valid(Credits.get()));
  const refresh=useCallback(()=>{
    setTot(Credits.total());
    setDu(Credits.dailyUsed());
    setBatches(Credits.valid(Credits.get()));
  },[]);
  const consume=useCallback(()=>{
    if(Credits.hasFree()){Credits.useFree();refresh();return true;}
    if(Credits.consume()){refresh();return true;}
    return false;
  },[refresh]);
  const earn=useCallback((n,type)=>{Credits.add(n,type);refresh();},[refresh]);
  return{tot,du,batches,refresh,consume,earn,hasFree:Credits.hasFree};
}

    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
  }

  if(provider==='openai'){
    const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},body:JSON.stringify({model:'gpt-4o-mini',max_tokens:3000,messages:[{role:'user',content:prompt}]})});

// Impact burst lines — 14 radial lines flash at snap moment (matches video)
function ImpactBurstSVG({size=240}){
  const cx=size/2, cy=size/2;
  const lines=Array.from({length:14},(_,i)=>{
    const a=(i/14)*Math.PI*2;
    const r1=size*.36, r2=size*(i%2===0?.7:.52);
    return{x1:cx+Math.cos(a)*r1,y1:cy+Math.sin(a)*r1,x2:cx+Math.cos(a)*r2,y2:cy+Math.sin(a)*r2,
      color:i%3===0?OJ.tealLight:i%3===1?OJ.teal:OJ.navy, w:i%2===0?3:2};
  });
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none">
      {lines.map((l,i)=><line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke={l.color} strokeWidth={l.w} strokeLinecap="round"/>)}
    </svg>
  );
}

function SplashScreen({onDone}){
  const[phase,setPhase]=useState(0);
  useEffect(()=>{
    const t=[
      setTimeout(()=>setPhase(1), 200),   // ghost trails + main icon spin in
      setTimeout(()=>setPhase(2), 2400),  // wordmark slides in
      setTimeout(()=>setPhase(3), 3000),  // tagline rises
      setTimeout(()=>setPhase(4), 3500),  // dots appear
      setTimeout(()=>setPhase(5), 4400),  // fade out
      setTimeout(()=>onDone&&onDone(), 4900),
    ];
    return()=>t.forEach(clearTimeout);
  },[]);
  return(
    <div className={`splash${phase>=5?' fade-out':''}`}>
      <div className={`splash-glow${phase>=1?' show':''}`}/>

      {/* Stack: ghost2 → ghost1 → impact → main icon */}

          <ImpactBurstSVG size={240}/>

          <SplashLogoIcon size={100}/>

    setTimeout(()=>setCopied(null),2000);
  };
  return{copied,copy};
}

function AdSession({onEarn,compact=false}){
  const[phase,setPhase]=useState('idle');
  const[sec,setSec]=useState(30);
  const[inQ,setInQ]=useState(0);
  const[qSize,setQSize]=useState(1);
  const[totEarned,setTotEarned]=useState(0);
  const pct=((30-sec)/30)*100;

  const go=(n)=>{setQSize(n);setInQ(0);setSec(30);setPhase('playing');};

  useEffect(()=>{
    if(phase!=='playing')return;
    if(sec>0){const t=setTimeout(()=>setSec(s=>s-1),1000);return()=>clearTimeout(t);}
    onEarn&&onEarn(1);
    setTotEarned(e=>e+1);
    if(inQ+1<qSize){setInQ(i=>i+1);setSec(30);}
    else setPhase('done');
  },[phase,sec,inQ,qSize]);

    <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>

        <span style={{fontSize:12,color:'var(--ok)',fontWeight:600}}>✓ +{totEarned} cr earned</span>
        {[1,5,10].map(n=><button key={n} className="btn btn-outline-accent btn-sm" onClick={()=>go(n)}>+{n}</button>)}
      </div>}

  );

  return(
    <div className="ad-wrap">
      <span className="ad-tag">AD</span>
      <div style={{flex:1}}>
        {phase==='idle'&&(
          <>
            <div className="ad-text" style={{marginBottom:8}}>Watch ads to earn credits — no daily limit</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {[1,3,5,10].map(n=>(

          </>
        )}
        {phase==='playing'&&(
          <>
            <div style={{fontSize:12,fontWeight:600,color:'var(--tx)',marginBottom:6}}>
              Ad {inQ+1}/{qSize} · <span style={{color:'var(--ac)'}}>{sec}s</span>

            </div>

              {Array.from({length:qSize},(_,i)=>(
                <div key={i} style={{height:3,flex:1,borderRadius:2,background:i<inQ?'var(--ok)':i===inQ?'var(--ac)':'var(--bo)',transition:'background .3s'}}/>

          <>

            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>

// ── PASSWORD HASHING (Web Crypto API) ────────────────────────────────
function _s256(s){
  function rr(v,a){return(v>>>a)|(v<<(32-a));}
  var mp=Math.pow,mw=mp(2,32),h=[],k=[],p=0,ic={};
  for(var c=2;p<64;c++){if(!ic[c]){for(var x=0;x<313;x+=c)ic[x]=c;h[p]=mp(c,.5)*mw|0;k[p++]=mp(c,1/3)*mw|0;}}
  var t=unescape(encodeURIComponent(s)),w=[],r='';
  t+='';while(t.length%64-56)t+='␀';
  for(var i=0;i<t.length;i++){var j=t.charCodeAt(i);if(j>>8)return'';w[i>>2]|=j<<((3-i)%4*8);}
  var ab=unescape(encodeURIComponent(s)).length*8;w[w.length]=(ab/mw)|0;w[w.length]=ab;
  for(var q=0;q<w.length;){
    var ww=w.slice(q,q+=16),oh=h.slice(0);
    for(var n=0;n<64;n++){
      var i2=n<16?ww[n]:(ww[n+1]=
        (function(v,x,y){return(v>>>x|v<<32-x)^(v>>>y|v<<32-y)^(v>>>3);})(ww[n-15],7,18)+ww[n-7]+
        (function(v,x,y){return(v>>>x|v<<32-x)^(v>>>y|v<<32-y)^(v>>>10);})(ww[n-2],17,19)+ww[n-16]);
      var a=h[0],b=h[1],cc=h[2],d=h[3],e=h[4],f=h[5],g=h[6],hh=h[7];
      var t1=hh+((e>>>6|e<<26)^(e>>>11|e<<21)^(e>>>25|e<<7))+(e&f^~e&g)+k[n]+(i2>>>0);
      var t2=((a>>>2|a<<30)^(a>>>13|a<<19)^(a>>>22|a<<10))+(a&b^a&cc^b&cc);
      h=[t1+t2,a,b,cc,d+t1,e,f,g];
    }
    for(var m=0;m<8;m++)h[m]=(h[m]+oh[m])|0;
  }
  for(var m=0;m<8;m++)for(var l=3;l+1;l--){var bv=(h[m]>>(l*8))&255;r+=(bv<16?'0':'')+bv.toString(16);}
  return r;
}
// ── RESUME FILE EXTRACTORS (PDF + Word), libraries loaded lazily from CDN ──
function _loadScript(src){
  return new Promise((resolve,reject)=>{
    if(document.querySelector('script[src="'+src+'"]')){resolve();return;}
    const s=document.createElement('script');
    s.src=src; s.onload=()=>resolve(); s.onerror=()=>reject(new Error('Failed to load '+src));
    document.head.appendChild(s);
  });
}
async function extractPdfText(file){
  if(!window.pdfjsLib){
    await _loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
    if(window.pdfjsLib){
      window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  }
  if(!window.pdfjsLib) throw new Error('PDF reader unavailable');
  const buf=await file.arrayBuffer();
  const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
  let out='';
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    out+=content.items.map(it=>it.str).join(' ')+'\n';
  }
  return out;
}
async function extractDocxText(file){
  if(!window.mammoth){
    await _loadScript('https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js');
  }
  if(!window.mammoth) throw new Error('Word reader unavailable');
  const buf=await file.arrayBuffer();
  const result=await window.mammoth.extractRawText({arrayBuffer:buf});
  return result.value||'';
}

async function hashPwd(pwd){
  const salted=pwd+'oj_s4lt_optajob_2025';
  try{
    if(window.crypto&&window.crypto.subtle){
      const buf=await window.crypto.subtle.digest('SHA-256',new TextEncoder().encode(salted));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }
  }catch(e){}
  return _s256(salted);
}
async function verifyPwd(pwd,hash){return(await hashPwd(pwd))===hash;}

// ── USERS DATABASE ────────────────────────────────────────────────────
// hm_udb: { "email": { name, email, pwdHash, status, plan, isAdmin, registeredAt, verifiedAt } }
// ── UDB — backed by real Supabase cloud DB, with a sync local cache ──────
// Many parts of the UI call UDB.get()/UDB.all() SYNCHRONOUSLY (during render).
// To support that without a full rewrite, we keep a local cache (_udbCache)
// that mirrors Supabase. cacheReady() resolves once the first cloud sync runs.
let _udbCache = LS.get('hm_udb_cache', {});
let _udbCacheReady = false;
let _udbReadyResolvers = [];
function _udbMarkReady(){ _udbCacheReady=true; _udbReadyResolvers.forEach(r=>r()); _udbReadyResolvers=[]; }
function udbWhenReady(){ return _udbCacheReady ? Promise.resolve() : new Promise(r=>_udbReadyResolvers.push(r)); }

function _rowToUser(row){
  if(!row) return null;
  return {
    name:row.name, email:row.email, pwdHash:row.password_hash,
    isAdmin:row.is_admin, plan:row.plan, status:row.status,
    creditDays:row.credit_days, avatarId:row.avatar_id, avatarColor:row.avatar_color,
    registeredAt:row.registered_at?new Date(row.registered_at).getTime():Date.now(),
    updatedAt:row.updated_at?new Date(row.updated_at).getTime():Date.now(),
  };
}
function _userToRow(email,data){
  const row={};
  if(data.name!==undefined) row.name=data.name;
  if(data.pwdHash!==undefined) row.password_hash=data.pwdHash;
  if(data.isAdmin!==undefined) row.is_admin=data.isAdmin;
  if(data.plan!==undefined) row.plan=data.plan;
  if(data.status!==undefined) row.status=data.status;
  if(data.creditDays!==undefined) row.credit_days=data.creditDays;
  if(data.avatarId!==undefined) row.avatar_id=data.avatarId;
  if(data.avatarColor!==undefined) row.avatar_color=data.avatarColor;
  row.email=email.toLowerCase();
  row.updated_at=new Date().toISOString();
  return row;
}

async function _udbSyncFromCloud(){
  try{
    const rows=await sb('users?select=*');
    const db={};
    (rows||[]).forEach(r=>{ db[r.email.toLowerCase()]=_rowToUser(r); });
    _udbCache=db;
    LS.set('hm_udb_cache', db);
  }catch(e){ console.warn('UDB cloud sync failed, using local cache:', e); }
  _udbMarkReady();
}
_udbSyncFromCloud();

const UDB={
  // Synchronous reads — served from cache (fresh after first cloud sync)
  get:(email)=>(_udbCache[email?.toLowerCase()]||null),
  all:()=>_udbCache,
  exists:(email)=>!!_udbCache[email?.toLowerCase()],
  admins:()=>Object.values(_udbCache).filter(u=>u.isAdmin),
  isAdmin:(email)=>!!_udbCache[email?.toLowerCase()]?.isAdmin,

  // Async write — goes to Supabase first, then updates the local cache
  async set(email,data){
    const lower=email.toLowerCase();
    const existing=_udbCache[lower]||{};
    const merged={...existing,...data,email:lower};
    _udbCache[lower]=merged; LS.set('hm_udb_cache',_udbCache); // optimistic local update
    try{
      const row=_userToRow(lower,data);
      const exists=await sb('users?email=eq.'+encodeURIComponent(lower)+'&select=email');
      if(exists&&exists.length){
        await sb('users?email=eq.'+encodeURIComponent(lower),{method:'PATCH',body:JSON.stringify(row),prefer:'return=minimal'});
      }else{
        row.registered_at=new Date(merged.registeredAt||Date.now()).toISOString();
        await sb('users',{method:'POST',body:JSON.stringify(row),prefer:'return=minimal'});
      }
    }catch(e){ console.warn('UDB.set cloud write failed (cached locally, will not persist across devices):', e); }
    return merged;
  },

  // Async — for callers that want guaranteed-fresh data from the cloud
  async getFresh(email){
    try{
      const rows=await sb('users?email=eq.'+encodeURIComponent(email.toLowerCase())+'&select=*');
      const u=_rowToUser(rows&&rows[0]);
      if(u){ _udbCache[email.toLowerCase()]=u; LS.set('hm_udb_cache',_udbCache); }
      return u;
    }catch(e){ return UDB.get(email); } // fall back to cache if offline
  },
};

// ── JOB API ROTATION MANAGER ──────────────────────────────────────────
const JobAPIs={
  getConfig:()=>LS.get('hm_job_apis',{
    providers:[],switchEvery:10,curIdx:0,curCount:0,notified60:false,
  }),
  save:(c)=>LS.set('hm_job_apis',c),
  getActive:()=>{
    const c=JobAPIs.getConfig();
    const today=new Date().toDateString();
    // Reset daily if new day
    let providers=c.providers.map(p=>p.lastReset!==today?{...p,usedToday:0,lastReset:today}:p);
    const enabled=providers.filter(p=>p.enabled&&p.key);
    if(!enabled.length){JobAPIs.save({...c,providers});return null;}
    const safeIdx=c.curIdx%enabled.length;
    const active=enabled[safeIdx];
    // Increment usage
    providers=providers.map(p=>p.id===active.id?{...p,usedToday:(p.usedToday||0)+1,usedTotal:(p.usedTotal||0)+1}:p);
    let curCount=c.curCount+1,curIdx=c.curIdx;
    if(curCount>=c.switchEvery){curIdx=(c.curIdx+1)%enabled.length;curCount=0;}
    // 60% notification
    const totalCap=providers.reduce((s,p=>s+(p.dailyLimit||0)),0);
    const totalUsed=providers.reduce((s,p)=>s+(p.usedToday||0),0);
    let notified60=c.notified60;
    if(!notified60&&totalCap>0&&totalUsed/totalCap>=0.6){
      notified60=true;
      const n=LS.get('hm_notifs',[]);
      n.unshift({id:Date.now(),type:'job_api',msg:`Job API usage at 60%+ (${totalUsed}/${totalCap} searches used today)`,at:Date.now(),read:false});
      LS.set('hm_notifs',n);
    }
    JobAPIs.save({...c,providers,curIdx,curCount,notified60});
    return active;
  },
  getTotals:()=>{
    const c=JobAPIs.getConfig();
    const today=new Date().toDateString();
    return{
      totalCap:c.providers.reduce((s,p)=>s+(p.dailyLimit||0),0),
      todayUsed:c.providers.reduce((s,p)=>s+(p.lastReset===today?p.usedToday||0:0),0),
      allTime:c.providers.reduce((s,p)=>s+(p.usedTotal||0),0),
      active:c.providers.filter(p=>p.enabled&&p.key).length,
      switchEvery:c.switchEvery,
    };
  },
};

      providers=providers.map(p=>p.id===active.id?{...p,usedToday:(p.usedToday||0)+1,usedTotal:(p.usedTotal||0)+1}:p);
      let curCount=(c.curCount||0)+1,curIdx=c.curIdx||0;
      if(curCount>=(c.switchEvery||10)){curIdx=(curIdx+1)%enabled.length;curCount=0;}
      // 60% check
      const totalCap=providers.reduce((s,p)=>s+(p.dailyLimit||0),0);
      const totalUsed=providers.reduce((s,p)=>s+(p.usedToday||0),0);
      let notified60=c.notified60;
      if(!notified60&&totalCap>0&&totalUsed/totalCap>=0.6){
        notified60=true;
        const n=LS.get('hm_notifs',[]);
        n.unshift({id:Date.now(),type:'email_api',msg:`Email API usage at 60%+ (${totalUsed}/${totalCap} emails used today)`,at:Date.now(),read:false});
        LS.set('hm_notifs',n);
      }
      EmailAPIs.save({...c,providers,curIdx,curCount,notified60});
    }
    // ── Actually send email via configured provider ──────────
    const log=LS.get('hm_email_log',[]);
    let sent=false;
    if(enabled.length>0){
      const prov=enabled[0];
      const subject=type==='register'?'Your OptaJob Verification Code':type==='reset'?'OptaJob Password Reset Code':'OptaJob Notification';
      const html=`<div style="font-family:sans-serif;max-width:480px;margin:auto;padding:32px;background:#0e2550;border-radius:16px;text-align:center">
        <div style="font-size:28px;font-weight:900;color:white;margin-bottom:4px">opta<span style="color:#3dbfa0">job</span></div>
        <div style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:24px">Choose Your Job</div>
        <div style="font-size:14px;color:rgba(255,255,255,.7);margin-bottom:16px">${type==='register'?'Your verification code:':'Your password reset code:'}</div>
        <div style="font-size:42px;font-weight:900;letter-spacing:12px;color:#3dbfa0;background:rgba(61,191,160,.1);padding:16px;border-radius:12px;margin-bottom:16px">${code}</div>
        <div style="font-size:12px;color:rgba(255,255,255,.4)">Valid for 24 hours. Do not share this code.<br/>If you did not request this, ignore this email.</div>
        <div style="margin-top:24px;font-size:11px;color:rgba(255,255,255,.3)">optajob.com &middot; Made by Udit Tandon</div>
      </div>`;
      try{
        const pt=prov.providerType||prov.type||'brevo';
        if(pt==='brevo'||pt==='sendinblue'){
          const r=await fetch('https://api.brevo.com/v3/transactional/emails/send',{
            method:'POST',headers:{'api-key':prov.key,'Content-Type':'application/json'},
            body:JSON.stringify({sender:{name:'OptaJob',email:prov.fromEmail||'noreply@optajob.com'},to:[{email}],subject,htmlContent:html})
          });
          sent=r.status<300;
        }else if(pt==='sendgrid'){
          const r=await fetch('https://api.sendgrid.com/v3/mail/send',{
            method:'POST',headers:{'Authorization':'Bearer '+prov.key,'Content-Type':'application/json'},
            body:JSON.stringify({personalizations:[{to:[{email}]}],from:{email:prov.fromEmail||'noreply@optajob.com',name:'OptaJob'},subject,content:[{type:'text/html',value:html}]})
          });
          sent=r.status<300;
        }else if(pt==='resend'){
          const r=await fetch('https://api.resend.com/emails',{
            method:'POST',headers:{'Authorization':'Bearer '+prov.key,'Content-Type':'application/json'},
            body:JSON.stringify({from:'OptaJob <noreply@optajob.com>',to:[email],subject,html})
          });
          sent=r.status<300;
        }else if(pt==='mailjet'){
          const r=await fetch('https://api.mailjet.com/v3.1/send',{
            method:'POST',headers:{'Content-Type':'application/json','Authorization':'Basic '+btoa(prov.key+':'+(prov.secret||''))},
            body:JSON.stringify({Messages:[{From:{Email:prov.fromEmail||'noreply@optajob.com',Name:'OptaJob'},To:[{Email:email}],Subject:subject,HTMLPart:html}]})
          });
          sent=r.status<300;
        }
      }catch(err){console.warn('Email send error:',err);}
    }
    // Log the attempt
    log.unshift({to:email,subject:type==='register'?'Verification Code':'Reset Code',code,sentAt:Date.now(),provider:enabled[0]?.providerType||'none',delivered:sent});
    LS.set('hm_email_log',log.slice(0,50));
    return sent;
  },
};

            // AI failed (bad key, quota, etc) — fall back silently to built-in

            setAiUsed(false);

const CITIES=['Bangalore','Mumbai','Delhi NCR','Hyderabad','Pune','Chennai','Remote','Worldwide'];

// ── CITY REGION MAPPING — suggest nearby major cities based on resume ──
const CITY_REGIONS={
  south:['Bangalore','Hyderabad','Chennai','Pune','Kochi','Coimbatore','Mumbai'],
  west:['Mumbai','Pune','Ahmedabad','Surat','Nagpur','Indore','Bangalore'],
  north:['Delhi NCR','Gurgaon','Noida','Chandigarh','Jaipur','Lucknow','Pune'],
  east:['Kolkata','Bhubaneswar','Guwahati','Patna','Ranchi','Delhi NCR','Bangalore'],
};
const CITY_TO_REGION={
  bangalore:'south',bengaluru:'south',hyderabad:'south',chennai:'south',kochi:'south',cochin:'south',coimbatore:'south',mysore:'south',madurai:'south',trivandrum:'south',
  mumbai:'west',pune:'west',ahmedabad:'west',surat:'west',nagpur:'west',indore:'west',nashik:'west',vadodara:'west',rajkot:'west',goa:'west',
  delhi:'north',gurgaon:'north',gurugram:'north',noida:'north',chandigarh:'north',jaipur:'north',lucknow:'north',kanpur:'north',ludhiana:'north',agra:'north',
  kolkata:'east',calcutta:'east',bhubaneswar:'east',guwahati:'east',patna:'east',ranchi:'east',siliguri:'east',
};
function suggestCitiesFromResume(text){
  const t=(text||'').toLowerCase();
  let region=null;
  for(const city in CITY_TO_REGION){
    if(t.includes(city)){ region=CITY_TO_REGION[city]; break; }
  }
  if(!region) return ['Bangalore','Mumbai','Delhi NCR','Hyderabad','Pune','Chennai','Remote'];
  return [...CITY_REGIONS[region],'Remote'];
}

// ── Extract likely job title + skills from resume text ──
const _SKILL_BANK=['javascript','python','java','react','node','sql','aws','azure','docker','kubernetes','html','css','typescript','angular','vue','php','ruby','golang','rust','swift','kotlin','flutter','django','spring','excel','tableau','powerbi','salesforce','sap','figma','photoshop','illustrator','seo','marketing','sales','accounting','finance','hr','recruitment','content','copywriting','data analysis','machine learning','ai','devops','testing','qa','android','ios','c++','c#','.net','spring boot','mongodb','postgresql','mysql','redis','kafka','graphql'];
function extractResumeSearch(text){
  const t=(text||'').toLowerCase();
  // Title: look for common title patterns in first 600 chars
  const head=t.slice(0,600);
  const titlePatterns=['software engineer','senior software engineer','full stack developer','frontend developer','backend developer','data scientist','data analyst','product manager','project manager','business analyst','marketing manager','sales executive','accountant','hr manager','ui designer','ux designer','graphic designer','devops engineer','qa engineer','content writer','digital marketing','web developer','mobile developer','android developer','ios developer'];
  let title='';
  for(const p of titlePatterns){ if(head.includes(p)){ title=p.replace(/\b\w/g,c=>c.toUpperCase()); break; } }
  // Skills: match against skill bank
  const skills=_SKILL_BANK.filter(s=>t.includes(s)).slice(0,6);
  if(!title && skills.length) title=skills.slice(0,2).map(s=>s.replace(/\b\w/g,c=>c.toUpperCase())).join(' ')+' Developer';
  const query=(title+(skills.length?' '+skills.slice(0,3).join(' '):'')).trim()||'jobs';
  return {title,skills,query,cities:suggestCitiesFromResume(text)};
}
const TYPES=['Full-time','Part-time','Remote','Hybrid','Contract'];

function SearchScreen({user}){
  const[query,setQuery]=useState('');
  const[city,setCity]=useState('');
  const[selCity,setSelCity]=useState([]);
  const[suggestedCities,setSuggestedCities]=useState([]);
  const[fromResume,setFromResume]=useState(false);
  const[selType,setSelType]=useState([]);
  const[showFilters,setShowFilters]=useState(false);
  const[jobs,setJobs]=useState(null);
  const[loading,setLoading]=useState(false);
  const[showCancel,setShowCancel]=useState(false);
  const[loadStep,setLoadStep]=useState(0);
  const[err,setErr]=useState('');
  const[savedJobs,setSavedJobs]=useState(()=>LS.get('hm_saved_jobs',[]));

  // If user arrived via "Find Jobs from Resume", auto-fill from the resume
  useEffect(()=>{
    const rs=window._ojResumeSearch;
    if(rs){
      if(rs.query)setQuery(rs.query);
      if(rs.cities&&rs.cities.length){
        setSuggestedCities(rs.cities);
        setSelCity(rs.cities.slice(0,1)); // pre-select the top city
      }
      setSortBy('match'); // sort by match by default when coming from resume
      setFromResume(true);
      setShowFilters(true); // open filters so suggestions are visible
      window._ojResumeSearch=null; // consume once
    }
  },[]);
  const[salary,setSalary]=useState('');
  const[sortBy,setSortBy]=useState('match'); // match|date|salary
  const[dateFilter,setDateFilter]=useState('any'); // any|7|30
  const[searchCtrl,setSearchCtrl]=useState(null); // AbortController
  const[showChooser,setShowChooser]=useState(false);
  const[chosenResume,setChosenResume]=useState(()=>{const r=LS.get('hm_resumes',[]);return r[0]?.content||'';});
  const profile=LS.get('hm_user',{});
  const resumes=LS.get('hm_resumes',[]);

  const tog=(arr,set,v)=>set(arr.includes(v)?arr.filter(x=>x!==v):[...arr,v]);

  const doSearch=async()=>{
    const cities=[...selCity,...(city?[city]:[])];
    if(!query.trim()&&!chosenResume){setErr('Enter a job title or upload a resume.');return;}
    if(!cities.length){setErr('Select at least one city.');return;}
    setErr('');setJobs(null);setLoading(true);setLoadStep(0);
    let s=0;const iv=setInterval(()=>{s=Math.min(s+1,LOAD_STEPS.length-1);setLoadStep(s);},2000);
    try{
      // ── Try real JSearch API first ─────────────────────────
      const jobCfg = LS.get('hm_job_apis', {providers:[]});
      const enabledApis = (jobCfg.providers||[]).filter(p=>p.enabled&&p.key);
      let jobs = null;

      if(enabledApis.length > 0){
        const api = enabledApis[0];
        const searchQ = encodeURIComponent(`${query||'jobs'} ${cities[0]||'India'}`);
        const salaryParam = salary ? `&salary_min=${salary.split('-')[0]||0}` : '';
        const url = `https://jsearch.p.rapidapi.com/search?query=${searchQ}&page=1&num_pages=2&country=in${salaryParam}`;
        const res = await fetch(url, {
          headers: {
            'X-RapidAPI-Key': api.key,
            'X-RapidAPI-Host': 'jsearch.p.rapidapi.com'
          }
        });
        if(res.ok){
          const data = await res.json();
          if(data.data && data.data.length > 0){
            // Map JSearch format to our format
            jobs = data.data.map((j,i) => {
              const sal = j.job_min_salary&&j.job_max_salary
                ? `₹${Math.round(j.job_min_salary/100000)}L–${Math.round(j.job_max_salary/100000)}L`
                : j.job_salary_source||null;
              const posted = j.job_posted_at_datetime_utc
                ? (() => {const d=Math.floor((Date.now()-new Date(j.job_posted_at_datetime_utc))/86400000); return d===0?'Today':d===1?'Yesterday':`${d} days ago`;})()
                : 'Recently';
              return {
                job_id: j.job_id||`j_${Date.now()}_${i}`,
                title: j.job_title,
                company: j.employer_name,
                location: [j.job_city, j.job_country].filter(Boolean).join(', ')||cities[0]||'India',
                type: j.job_employment_type||'Full-time',
                salary: sal,
                platform: j.job_publisher||'JSearch',
                applyUrl: j.job_apply_link||j.job_google_link||'#',
                description: (j.job_description||'').slice(0,200),
                matchScore: Math.min(97, 60 + Math.floor(Math.random()*30)),
                matchedSkills: [],
                missingSkills: [],
                postedDate: posted,
                companySize: j.employer_company_type||'Company',
                whyMatch: `${j.job_title} role at ${j.employer_name}`
              };
            });
            // Update API usage counter
            const today = new Date().toDateString();
            const updated = (jobCfg.providers||[]).map(p =>
              p.id===api.id ? {...p,usedToday:(p.lastReset===today?(p.usedToday||0):0)+1,lastReset:today} : p
            );
            LS.set('hm_job_apis',{...jobCfg,providers:updated});
          }
        }
      }

      // ── Fallback: AI-generated jobs (if no API or API failed) ─
      if(!jobs){
        const prompt=`Find real jobs for this search. ROLE: ${query||'professional'} | CITIES: ${cities.join(', ')} | TYPES: ${selType.join(',')||'any'}
Return ONLY a valid JSON array of 8 jobs:
[{"job_id":"j1","title":"","company":"","location":"","type":"","salary":null,"platform":"LinkedIn","applyUrl":"https://linkedin.com/jobs","description":"2 sentences about role","matchScore":85,"matchedSkills":[],"missingSkills":[],"postedDate":"2 days ago","companySize":"Large","whyMatch":"one sentence"}]
Return ONLY the JSON array. No text before or after.`;
        const raw = await callClaude(prompt,'Return ONLY a valid JSON array.',true);
        clearInterval(iv);
        const m = raw.replace(/\`\`\`json|\`\`\`/g,'').match(/\[[\s\S]*\]/);
        if(!m) throw new Error('No jobs found. Try different keywords or cities.');
        jobs = JSON.parse(m[0]);
        if(!Array.isArray(jobs)||!jobs.length) throw new Error('No matches. Try broader terms.');
      }

      clearInterval(iv);
      const withIds = jobs.map((j,i)=>({...j,job_id:j.job_id||`job_${Date.now()}_${i}`}));
      setJobs(withIds);
      LS.set('hm_last_search',{query:query||'Resume-based search',location:cities[0]||'India',count:withIds.length});
    }catch(e){clearInterval(iv);setErr(e.message||'Search failed. Please retry.');}
    finally{setLoading(false);}
  };

  const saveJob=j=>{const u=[j,...savedJobs.filter(x=>x.job_id!==j.job_id)];setSavedJobs(u);LS.set('hm_saved_jobs',u);};
  const unsaveJob=id=>{const u=savedJobs.filter(x=>x.job_id!==id);setSavedJobs(u);LS.set('hm_saved_jobs',u);};

  return(
    <div className="screen">
      {/* Search bar */}
      <div className="search-bar">
        <div className="search-input-wrap">
          <Icon.Search/>
          <input className="search-input" value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()} placeholder="Job title, skill, or company…"/>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setShowFilters(v=>!v)} style={{flexShrink:0,color:showFilters?'var(--ac)':'var(--mu)'}}>Filters {showFilters?'▲':'▼'}</button>
      </div>

      {/* Filters */}
      {/* ── Salary filter chips ── */}
      <div className="salary-chips">
        {[['','Any Salary'],['0-300000','Under ₹3L'],['300000-600000','₹3L–6L'],['600000-1200000','₹6L–12L'],['1200000-2500000','₹12L–25L'],['2500000+','₹25L+']].map(([v,l])=>(
          <div key={v} className={`salary-chip${salary===v?' on':''}`} onClick={()=>setSalary(v)}>{l}</div>
        ))}
      </div>
      {/* ── Sort + date filter ── */}
      <div className="sort-bar">
        <span style={{fontSize:12,color:'var(--mu)',flexShrink:0}}>Sort:</span>
        <select className="sort-select" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="match">Best Match</option>
          <option value="date">Newest First</option>
          <option value="salary">Highest Salary</option>
        </select>
        <span style={{fontSize:12,color:'var(--mu)',flexShrink:0}}>Posted:</span>
        <select className="sort-select" value={dateFilter} onChange={e=>setDateFilter(e.target.value)}>
          <option value="any">Any time</option>
          <option value="7">Last 7 days</option>
          <option value="30">Last 30 days</option>
        </select>
      </div>
      {showFilters&&(
        <div style={{padding:'12px 20px',background:'var(--s2)',borderBottom:'1px solid var(--bo)'}}>
          <div style={{marginBottom:10}}>
            <div className="label" style={{marginBottom:6}}>Cities{fromResume&&suggestedCities.length>0&&<span style={{fontWeight:400,color:'var(--ac)',fontSize:11}}> · suggested from your resume</span>}</div>
            <div className="chips">
              {(suggestedCities.length>0?[...suggestedCities,...CITIES.filter(c=>!suggestedCities.includes(c))]:CITIES).map(c=><button key={c} className={`chip ${selCity.includes(c)?'on':''}`} onClick={()=>tog(selCity,setSelCity,c)}>{c}</button>)}
            </div>
            <input className="input" style={{marginTop:8}} value={city} onChange={e=>setCity(e.target.value)} placeholder="Add another city…"/>
          </div>
          <div>
            <div className="label" style={{marginBottom:6}}>Job Type</div>
            <div className="chips">{TYPES.map(t=><button key={t} className={`chip ${selType.includes(t)?'on':''}`} onClick={()=>tog(selType,setSelType,t)}>{t}</button>)}</div>
          </div>
        </div>
      )}

      {/* Resume in use */}
      {resumes.length>0&&(
        <div style={{padding:'10px 20px',background:'var(--s)',borderBottom:'1px solid var(--bo)',display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:12,color:'var(--mu)'}}>Using:</span>
          <span style={{fontSize:12.5,fontWeight:600,color:'var(--ac)',flex:1}}>{resumes.find(r=>r.content===chosenResume)?.name||resumes[0].name}</span>
          <button className="btn btn-ghost btn-sm" onClick={()=>setShowChooser(true)}>Change</button>
        </div>
      )}

      {err&&<div style={{margin:'10px 20px',padding:'12px',background:'var(--erp)',borderRadius:'var(--r1)',color:'var(--er)',fontSize:13}}>⚠ {err}</div>}

      {/* Search button */}
      {!jobs&&!loading&&(
        <div style={{padding:'20px'}}>
          <button className="btn btn-primary btn-full" onClick={doSearch} style={{padding:'15px',fontSize:15}}>🔍 Find Matching Jobs</button>
          {!chosenResume&&resumes.length===0&&<div style={{fontSize:12,color:'var(--mu)',textAlign:'center',marginTop:10}}>Tip: Upload your resume in Resume tab for better matches</div>}
        </div>
      )}

      {/* Loading */}
      {loading&&(
        <div className="loading-wrap">
          <AnimatedLoader size="sm"/>
          <div style={{fontSize:13,color:'var(--mu)',textAlign:'center'}}>{LOAD_STEPS[loadStep]}</div>
          <div style={{width:'100%',maxWidth:280,display:'flex',flexDirection:'column',gap:6,marginTop:8}}>
            {LOAD_STEPS.map((s,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:8,fontSize:12,opacity:i<=loadStep?1:.3,color:i<loadStep?'var(--ok)':i===loadStep?'var(--ac)':'var(--mu)'}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:'currentColor',flexShrink:0}}/>
                {s}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Results */}
      {jobs&&!loading&&(
        <>
          <div style={{padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span className="pill pill-ok">✓ {jobs.length} matches</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setJobs(null);setErr('');}}>New Search</button>
          </div>
          <div style={{padding:'0 20px'}}>
            {jobs.map((job,i)=>(
              <JobCard key={job.job_id} job={job} idx={i} resume={chosenResume} profile={profile}
                savedJobs={savedJobs} onSave={saveJob} onUnsave={unsaveJob}/>
            ))}
          </div>
          <div style={{padding:'20px'}}>
            <button className="btn btn-ghost btn-full" onClick={doSearch}>↺ Search Again</button>
          </div>
        </>
      )}

      {/* Resume chooser */}
      {showChooser&&(
        <div className="modal-wrap" onClick={e=>e.target===e.currentTarget&&setShowChooser(false)}>
          <div className="modal-sheet">
            <div className="modal-drag"/>
            <div className="modal-head">
              <div><div className="modal-title">Choose Resume</div><div className="modal-sub">Which resume to use for this search?</div></div>
              <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>setShowChooser(false)}><Icon.X/></button>
            </div>
            <div className="modal-body">
              {resumes.map(r=>(
                <div key={r.id} className="rslot" style={{cursor:'pointer',border:r.content===chosenResume?'1.5px solid var(--ac)':'1px solid var(--bo)'}} onClick={()=>{setChosenResume(r.content);setShowChooser(false);}}>
                  <div className="rslot-icon">📄</div>
                  <div><div className="rslot-name">{r.name}</div><div className="rslot-meta">{r.wordCount} words · {new Date(r.savedAt).toLocaleDateString('en-IN')}</div></div>
                  {r.content===chosenResume&&<div style={{color:'var(--ac)'}}><Icon.Check/></div>}
                </div>
              ))}
              <button className="btn btn-ghost btn-full" style={{marginTop:8}} onClick={()=>{setChosenResume('');setShowChooser(false);}}>Search without resume</button>
            </div>
          </div>
        </div>
      )}
      <div style={{height:20}}/>
    </div>
  );
}
